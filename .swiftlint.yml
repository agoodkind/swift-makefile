excluded:
  - .build
  - .make
  - build
  - Products
  - Derived
  - DerivedData
  - .swiftpm

opt_in_rules:
  - all

analyzer_rules:
  - all

disabled_rules:
  - accessibility_label_for_image
  - accessibility_trait_for_button
  - attributes
  - conditional_returns_on_newline
  - contrasted_opening_brace
  - discouraged_default_parameter
  - discouraged_optional_collection
  - explicit_acl
  - explicit_enum_raw_value
  - explicit_self
  - explicit_top_level_acl
  - explicit_type_interface
  - file_types_order
  - indentation_width
  - legacy_objc_type
  - missing_docs
  - multiline_arguments_brackets
  - multiline_literal_brackets
  - multiline_parameters_brackets
  - no_grouping_extension
  - one_declaration_per_file
  - prefer_self_in_static_references
  - prefixed_toplevel_constant
  - required_deinit
  - sorted_imports
  - switch_case_on_newline
  - trailing_comma
  - type_contents_order
  - vertical_whitespace_between_cases
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

custom_rules:
  no_inline_swiftlint_disable:
    regex: "swiftlint:disable"
    message: "Do not disable SwiftLint inline."
    severity: error

file_header:
  required_pattern: |
    \/\/
    \/\/  [^\n]+\.swift
    \/\/  [^\n]+
    \/\/
    \/\/  Created by [^<\n]+ <[^>\n]+> on [^\n]+\.
    \/\/  Copyright © \d{4}, all rights reserved\.
    \/\/

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_interpolated_strings: true
  ignores_urls: true

file_length:
  warning: 450
  error: 800
  ignore_comment_only_lines: true

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 60
  error: 100

closure_body_length:
  warning: 50
  error: 90

cyclomatic_complexity:
  warning: 10
  error: 16
  ignores_case_statements: true

function_parameter_count:
  warning: 5
  error: 7

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - x
    - y
    - z

large_tuple:
  warning: 2
  error: 3

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

reporter: xcode

name: Setup Linux swift-mk
description: Provide the Linux swift-mk change-detection binary from the swift-makefile engine checkout, with no Xcode or macOS tooling.

runs:
  using: composite
  steps:
    # Resolve the engine checkout root and the cache/asset key. The key comes from the shared
    # scripts/swift-mk-asset-key.sh so the consumer side here and the publisher side compute it
    # the same way; that script fails loud on a missing input or an empty runtime signal.
    - name: Resolve swift-mk source
      id: swift-mk-src
      shell: bash
      run: |
        set -euo pipefail
        # GITHUB_ACTION_PATH is the action directory; three levels up is the swift-makefile repo
        # root, for both the local ./.github/... use and a pinned @ref consumer use.
        src=$(cd "${GITHUB_ACTION_PATH}/../../.." && pwd)
        echo "dir=${src}" >> "${GITHUB_OUTPUT}"
        key=$(bash "${src}/scripts/swift-mk-asset-key.sh" "${src}")
        echo "hash=${key}" >> "${GITHUB_OUTPUT}"
        echo "setup-linux-swift-mk: asset key ${key}"

    # Restore the toolchain cache first, so the swift-makefile repo's own PRs, which can restore
    # their default-branch cache, get a fast cache hit and never touch the network. The
    # release-asset download is the fallback for cross-repo consumers whose ref-scoped cache never
    # hits. Whatever populates the toolchain directory on a miss is saved here at post-job, so a
    # later same-ref run hits the cache and skips both the download and the build.
    - name: Restore swift-mk toolchain
      id: swift-mk-toolchain
      uses: actions/cache@v5
      with:
        path: ~/.swift-mk-ci-toolchain
        # The key includes runner.os, so the Linux binary caches independently from the macOS one,
        # plus the engine source hash and the active Swift toolchain.
        key: swift-mk-ci-toolchain-${{ runner.os }}-${{ runner.arch }}-${{ steps.swift-mk-src.outputs.hash }}

    # Provide the binary from the cache, the published release asset, or a source build. The
    # script fails loud on any real error; only a 404 (no asset published for this source yet)
    # falls through to the build. See provide-swift-mk.sh.
    - name: Provide swift-mk
      id: provide
      shell: bash
      env:
        SWIFT_MK_SRC: ${{ steps.swift-mk-src.outputs.dir }}
        SWIFT_MK_CACHE_HIT: ${{ steps.swift-mk-toolchain.outputs.cache-hit }}
        SWIFT_MK_ASSET: swift-mk-linux-${{ steps.swift-mk-src.outputs.hash }}
      run: bash "${GITHUB_ACTION_PATH}/provide-swift-mk.sh"

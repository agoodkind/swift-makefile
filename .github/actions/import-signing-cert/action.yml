name: Import Developer ID signing certificate
description: Import the Developer ID Application certificate with apple-actions/import-codesign-certs and resolve its codesigning identity SHA-1.

inputs:
  p12-base64:
    description: Base64-encoded Developer ID Application .p12.
    required: true
  p12-password:
    description: Import password for the .p12.
    required: true
  identity-name:
    description: 'Full identity name to resolve, e.g. "Developer ID Application: Name (TEAMID)".'
    required: true

outputs:
  identity-sha1:
    description: SHA-1 of the resolved codesigning identity.
    value: ${{ steps.resolve.outputs.identity-sha1 }}
  keychain:
    description: Absolute keychain database path for codesign --keychain.
    value: ${{ steps.keychain.outputs.path }}

runs:
  using: composite
  steps:
    # Each runner process on a reused VM gets its own keychain name. Deleting
    # this runner's prior keychain keeps sequential reuse idempotent without
    # touching another active runner's signing keychain.
    - name: Resolve signing keychain name
      id: keychain
      shell: bash
      run: |
        set -euo pipefail

        runner_name="${RUNNER_NAME:-runner}"
        runner_slug="$(printf '%s' "$runner_name" | tr -c 'A-Za-z0-9_.' '_' | cut -c 1-80)"
        runner_hash="$(printf '%s' "$runner_name" | shasum -a 256 | awk '{ print substr($1, 1, 12) }')"
        keychain_name="swift_mk_signing_${runner_slug}_${runner_hash}"
        # apple-actions appends .keychain to its keychain input and runs
        # security create-keychain on the result. Pass an absolute path with no
        # extension so the create runs on an absolute path. A bare name makes
        # security resolve the default keychain directory through a Security
        # session, and the session-less pool runner has none, so a bare-name
        # create fails with UNIX[Permission denied]. An absolute path needs no
        # session. keychain_path is the resulting .keychain-db file that security
        # and codesign both accept.
        keychain_base="${HOME}/Library/Keychains/${keychain_name}"
        keychain_path="${keychain_base}.keychain-db"
        printf 'path_noext=%s\n' "$keychain_base" >> "$GITHUB_OUTPUT"
        printf 'path=%s\n' "$keychain_path" >> "$GITHUB_OUTPUT"

    - name: Remove stale signing keychain for this runner
      shell: bash
      env:
        KEYCHAIN_PATH: ${{ steps.keychain.outputs.path }}
      run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

    - uses: apple-actions/import-codesign-certs@v3
      with:
        p12-file-base64: ${{ inputs.p12-base64 }}
        p12-password: ${{ inputs.p12-password }}
        keychain: ${{ steps.keychain.outputs.path_noext }}

    - name: Scope the user keychain search list to the signing keychain
      shell: bash
      env:
        KEYCHAIN_PATH: ${{ steps.keychain.outputs.path }}
      run: |
        set -euo pipefail

        # xcodebuild's provisioning reads the -d user keychain search list from
        # $HOME/Library/Preferences/com.apple.security.plist. On the self-hosted
        # pool each job runs with its own HOME (slot-home-N), so this list is
        # already per-slot isolated and co-tenant slots cannot clobber it.
        # apple-actions leaves the list as [signing, login]; under a per-slot HOME
        # that bare "login" resolves to a fresh empty per-slot login keychain that
        # does not retain a usable signing entry, so provisioning reports
        # "No certificate for team". Set the list explicitly to the signing
        # keychain plus the System keychain: the signing keychain supplies the
        # identity and the System keychain supplies the trust anchors that
        # validate the Developer ID chain.
        security list-keychains -d user -s "$KEYCHAIN_PATH" /Library/Keychains/System.keychain

    - name: Resolve identity SHA-1
      id: resolve
      shell: bash
      env:
        IDENTITY_NAME: ${{ inputs.identity-name }}
        KEYCHAIN_PATH: ${{ steps.keychain.outputs.path }}
      run: |
        set -euo pipefail

        identity_sha1="$(
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
                | awk -v identity="$IDENTITY_NAME" '
                    BEGIN { quoted = sprintf("%c%s%c", 34, identity, 34) }
                    index($0, quoted) { print $2; exit }
                '
        )"

        if [[ -z "$identity_sha1" ]]; then
            echo "Developer ID Application identity '$IDENTITY_NAME' not found in $KEYCHAIN_PATH" >&2
            exit 1
        fi

        printf 'identity-sha1=%s\n' "$identity_sha1" >> "$GITHUB_OUTPUT"

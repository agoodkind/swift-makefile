name: Run test
description: >-
  Check out swift-makefile helpers, set up the build environment, install
  signing credentials, and run the test make target. Called by both the
  pool-attempt and hosted-fallback test jobs so neither duplicates steps.

inputs:
  xcode-version:
    description: Xcode version to select on the runner.
    required: true
  github-token:
    description: GitHub token for authenticated API requests during setup.
    required: true
  brew-packages:
    description: Space-separated brew packages to install before setup.
    required: false
    default: ""
  cache-profile:
    description: Cache profile passed to setup-build-env.
    required: false
    default: safe
  cache-version:
    description: Cache namespace version for manual invalidation.
    required: false
    default: v1
  extra-cache-paths:
    description: Newline-separated additional paths for the build-intermediate cache.
    required: false
    default: ""
  import-signing-cert:
    description: >-
      Import a Developer ID certificate before testing. Pass 'true' or 'false'
      (boolean workflow inputs are stringified when forwarded here).
    required: false
    default: "false"
  install-provisioning-profile:
    description: >-
      Install a Developer ID provisioning profile before testing. Pass 'true'
      or 'false'.
    required: false
    default: "false"
  signing-identity-name:
    description: Full Developer ID identity name for codesign resolution.
    required: false
    default: ""
  apple-team-id:
    description: Apple Developer Team ID forwarded to make.
    required: false
    default: ""
  setup-target:
    description: Optional make target to run before test.
    required: false
    default: ""
  make-args:
    description: Extra arguments appended to every make invocation.
    required: false
    default: ""
  p12-base64:
    description: Base64-encoded Developer ID Application .p12 (secret forwarded as input).
    required: false
    default: ""
  p12-password:
    description: Import password for the .p12 (secret forwarded as input).
    required: false
    default: ""
  provisioning-profile-base64:
    description: Base64-encoded provisioning profile (secret forwarded as input).
    required: false
    default: ""
  notary-key-base64:
    description: Base64-encoded App Store Connect API key (secret forwarded as input).
    required: false
    default: ""
  notary-key-id:
    description: App Store Connect API key ID (secret forwarded as input).
    required: false
    default: ""
  notary-issuer-id:
    description: App Store Connect API issuer ID (secret forwarded as input).
    required: false
    default: ""

runs:
  using: composite
  steps:
    # Set SWIFT_MK_HELPER_ROOT once so every subsequent step shares it via
    # $GITHUB_ENV. The composite action resolves ./ relative to swift-makefile,
    # so nested action calls (setup-build-env, signing) use the same SHA.
    - name: Set SWIFT_MK_HELPER_ROOT
      shell: bash
      env:
        REPO: ${{ github.repository }}
      run: |
        if [[ "${REPO}" == "agoodkind/swift-makefile" ]]; then
          printf 'SWIFT_MK_HELPER_ROOT=.\n' >> "${GITHUB_ENV}"
        else
          printf 'SWIFT_MK_HELPER_ROOT=.swift-makefile\n' >> "${GITHUB_ENV}"
        fi

    - name: Checkout swift-makefile helpers
      if: github.repository != 'agoodkind/swift-makefile'
      uses: actions/checkout@v7
      with:
        repository: agoodkind/swift-makefile
        ref: main
        path: .swift-makefile
        fetch-depth: 1

    - name: Install brew packages
      if: inputs.brew-packages != ''
      shell: bash
      env:
        BREW_PACKAGES: ${{ inputs.brew-packages }}
      run: bash "${SWIFT_MK_HELPER_ROOT}/.github/actions/install-brew-packages/install-brew-packages.sh"

    - name: Setup Swift build env
      uses: ./.github/actions/setup-build-env
      with:
        xcode-version: ${{ inputs.xcode-version }}
        github-token: ${{ inputs.github-token }}
        cache-profile: ${{ inputs.cache-profile }}
        cache-version: ${{ inputs.cache-version }}
        extra-cache-paths: ${{ inputs.extra-cache-paths }}

    - name: Validate signing inputs
      if: ${{ inputs.import-signing-cert == 'true' || inputs.install-provisioning-profile == 'true' }}
      shell: bash
      env:
        IMPORT_SIGNING_CERT: ${{ inputs.import-signing-cert }}
        INSTALL_PROVISIONING_PROFILE: ${{ inputs.install-provisioning-profile }}
        HAS_SIGNING_CERT: ${{ inputs.p12-base64 != '' }}
        HAS_SIGNING_PASSWORD: ${{ inputs.p12-password != '' }}
        HAS_PROVISIONING_PROFILE: ${{ inputs.provisioning-profile-base64 != '' }}
      run: swift "${SWIFT_MK_HELPER_ROOT}/.github/actions/workflow-helper/workflow-helper.swift" validate-signing-inputs

    - name: Install signing certificate
      id: cert
      if: ${{ inputs.import-signing-cert == 'true' }}
      uses: ./.github/actions/import-signing-cert
      with:
        p12-base64: ${{ inputs.p12-base64 }}
        p12-password: ${{ inputs.p12-password }}
        identity-name: ${{ inputs.signing-identity-name }}

    - name: Install provisioning profile
      id: profile
      if: ${{ inputs.install-provisioning-profile == 'true' }}
      uses: ./.github/actions/install-provisioning-profile
      with:
        profile-base64: ${{ inputs.provisioning-profile-base64 }}

    - name: Run setup target
      if: inputs.setup-target != ''
      shell: bash
      env:
        MAKE_TARGET: ${{ inputs.setup-target }}
        MAKE_ARGS: ${{ inputs.make-args }}
        CERT_SHA1: ${{ steps.cert.outputs.identity-sha1 }}
        TEAM_ID: ${{ inputs.apple-team-id }}
        PROVISIONING_PROFILE_SPECIFIER: ${{ steps.profile.outputs.profile-specifier }}
        APPLE_NOTARY_KEY_BASE64: ${{ inputs.notary-key-base64 }}
        APPLE_NOTARY_KEY_ID: ${{ inputs.notary-key-id }}
        APPLE_NOTARY_ISSUER_ID: ${{ inputs.notary-issuer-id }}
      run: swift "${SWIFT_MK_HELPER_ROOT}/.github/actions/workflow-helper/workflow-helper.swift" run-make-with-signing

    - name: Run test
      shell: bash
      env:
        MAKE_TARGET: test
        MAKE_ARGS: ${{ inputs.make-args }}
        CERT_SHA1: ${{ steps.cert.outputs.identity-sha1 }}
        TEAM_ID: ${{ inputs.apple-team-id }}
        PROVISIONING_PROFILE_SPECIFIER: ${{ steps.profile.outputs.profile-specifier }}
        APPLE_NOTARY_KEY_BASE64: ${{ inputs.notary-key-base64 }}
        APPLE_NOTARY_KEY_ID: ${{ inputs.notary-key-id }}
        APPLE_NOTARY_ISSUER_ID: ${{ inputs.notary-issuer-id }}
      run: swift "${SWIFT_MK_HELPER_ROOT}/.github/actions/workflow-helper/workflow-helper.swift" run-make-with-signing

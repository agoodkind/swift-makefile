name: Setup Swift build env
description: Select Xcode and install the generator and analysis tools a consumer declares, with shared dependency and build-intermediate caches.

inputs:
  xcode-version:
    description: Xcode version to select on the runner.
    required: true
  github-token:
    description: GitHub token used by mise for authenticated GitHub API requests.
    required: true
  install-tuist:
    description: >-
      Install Tuist via mise. "auto" installs only when the repo has a
      .tool-versions file; "true"/"false" force.
    required: false
    default: auto
  install-xcodegen:
    description: >-
      Install XcodeGen via brew. "auto" installs only when the repo has a
      project.yml; "true"/"false" force.
    required: false
    default: auto
  install-lint-tools:
    description: Install swift-format, swiftlint, periphery, and osv-scanner.
    required: false
    default: "true"
  cache-profile:
    description: >-
      Cache profile. "safe" restores dependencies and build intermediates,
      "dependencies" restores only dependency caches, and "off" disables caches.
    required: false
    default: safe
  cache-version:
    description: Manual namespace for canonical cache invalidation.
    required: false
    default: v1
  extra-cache-paths:
    description: >-
      Newline-separated non-secret, non-final-artifact paths appended to the
      safe build-intermediate cache.
    required: false
    default: ""
  gate:
    description: >-
      The gate this job runs (build, test, lint-deadcode, a lint name, ...). It
      scopes the rolling compile cache so each compiling gate keeps its own pile;
      only the compiling gates (build, test, lint-deadcode) restore and save it.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ inputs.xcode-version }}

    - name: Authenticate github.com git clones
      shell: bash
      env:
        TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        if [ -n "${TOKEN}" ]; then
            # Mask the token first so a later git error that echoes the rewritten
            # URL cannot disclose it in the run log.
            echo "::add-mask::${TOKEN}"
            # SwiftPM clones dependencies out-of-tree, which bypasses actions/checkout's
            # repo-local auth. Global auth avoids GitHub's unauthenticated 403 rate limit.
            git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"
        fi

    - name: Resolve dependency hash
      id: dependency-hash
      shell: bash
      env:
        DEPENDENCY_HASH: ${{ hashFiles('Package.swift', 'Package.resolved', 'Project.swift', 'Workspace.swift', 'Tuist.swift', 'Tuist/Package.swift', 'Tuist/Package.resolved', 'Tools/Package.swift', 'Tools/Package.resolved', 'swiftcheck/Package.swift', 'swiftcheck/Package.resolved', 'project.yml') }}
      run: |
        set -euo pipefail

        if [[ -z "${DEPENDENCY_HASH}" ]]; then
            DEPENDENCY_HASH="no-deps"
        fi
        printf 'value=%s\n' "${DEPENDENCY_HASH}" >> "${GITHUB_OUTPUT}"

    - name: Configure self-hosted pool cache
      shell: bash
      env:
        DEPENDENCY_HASH: ${{ steps.dependency-hash.outputs.value }}
      run: |
        set -euo pipefail

        POOL_CACHE_ROOT="/Volumes/My Shared Files/cache"
        if [[ ! -d "${POOL_CACHE_ROOT}" ]]; then
            echo "pool cache mount absent at ${POOL_CACHE_ROOT}; falling back to actions/cache"
            exit 0
        fi

        # The write-heavy CAS stores stay off the shared mount because concurrent
        # writers corrupt them with CASID missing from Object Store failures, so
        # SWIFT_MK_XCODE_CACHE_PATH and SWIFT_MK_SWIFTPM_CACHE_PATH stay unset
        # and keep their VM-local defaults.
        module_cache="${POOL_CACHE_ROOT}/swift-mk/module-cache"
        spm_cache="${POOL_CACHE_ROOT}/spm/${DEPENDENCY_HASH}/SourcePackages"
        mkdir -p "${module_cache}" "${spm_cache}"
        {
            printf 'SWIFT_MK_POOL=1\n'
            printf 'SWIFT_MK_MODULE_CACHE=%s\n' "${module_cache}"
            printf 'SWIFT_MK_SPM_CACHE=%s\n' "${spm_cache}"
        } >> "${GITHUB_ENV}"

    # The cache plan (keys plus the cacheable path list) lives in the swift-mk
    # engine (`swift-mk cache plan`), so CI and local share one cache model. The
    # engine must be built before it can emit the plan that warms the build, so a
    # dedicated swift-mk toolchain cache, keyed on the engine source, is restored
    # first; it never depends on the consumer's caches, so there is no cycle.
    - name: Resolve swift-mk source
      id: swift-mk-src
      shell: bash
      run: |
        set -euo pipefail
        # Build swift-mk from the action's own checkout, so the action YAML and the
        # engine binary it builds always come from the same commit, and a consumer
        # needs no separate helper checkout for the toolchain build. GITHUB_ACTION_PATH
        # is the action directory; three levels up is the swift-makefile repo root,
        # for both the local `./.github/...` use and a pinned `@ref` consumer use.
        src=$(cd "${GITHUB_ACTION_PATH}/../../.." && pwd)
        echo "dir=${src}" >> "${GITHUB_OUTPUT}"
        # Key the toolchain cache on the engine source content, so it invalidates on
        # an engine change and hits otherwise. Build the file list defensively:
        # Sources always exists, but Package.resolved is gitignored in swift-makefile's
        # own repo, so listing missing paths via find under pipefail must not abort the
        # step. Null-delimit the list so a path containing whitespace cannot corrupt the
        # hash, and sort the per-file hashes (not the filenames) so the key is order- and
        # whitespace-stable.
        file_list=$(mktemp)
        find "${src}/Sources" -type f -print0 >> "${file_list}" 2>/dev/null || true
        for manifest in Package.swift Package.resolved scripts/swift-mk-build.sh; do
            if [ -f "${src}/${manifest}" ]; then
                printf '%s\0' "${src}/${manifest}" >> "${file_list}"
            fi
        done
        source_hash=$(xargs -0 shasum < "${file_list}" | awk '{ print $1 }' | LC_ALL=C sort | shasum | awk '{ print $1 }')
        rm -f "${file_list}"
        # Fold the ACTIVE toolchain into the key. The cached binary links
        # libIndexStore by @rpath into the exact Xcode bundle it was built against, so
        # reusing it under a different bundle fails to load that dylib and aborts on
        # launch. The version strings alone are not enough: a release candidate and the
        # final of the same version report the same `xcodebuild -version` and
        # `swift --version`, yet live in different .app bundles, so a binary built
        # against the RC bundle links a path that does not exist under the final bundle.
        # Fold in the resolved developer dir (`xcode-select -p`), the .app bundle path
        # the @rpath binds against, so a cache hit guarantees the same bundle.
        toolchain_id=$(
            {
                xcodebuild -version 2>/dev/null || true
                swift --version 2>/dev/null || true
                xcode-select -p 2>/dev/null || true
            } | shasum | awk '{ print $1 }'
        )
        echo "hash=${source_hash}-${toolchain_id}" >> "${GITHUB_OUTPUT}"

    - name: Restore swift-mk toolchain
      id: swift-mk-toolchain
      if: env.SWIFT_MK_POOL != '1'
      uses: actions/cache@v5
      with:
        path: ~/.swift-mk-ci-toolchain
        # The key includes the engine source hash and the active toolchain id, so a
        # cached binary is only ever reused under the identical Xcode/Swift it was
        # built against.
        key: swift-mk-ci-toolchain-${{ runner.os }}-${{ runner.arch }}-${{ steps.swift-mk-src.outputs.hash }}

    - name: Build swift-mk and compute cache plan
      id: cache-plan
      shell: bash
      env:
        SWIFT_MK_SRC: ${{ steps.swift-mk-src.outputs.dir }}
        TOOLCHAIN_CACHE_HIT: ${{ steps.swift-mk-toolchain.outputs.cache-hit }}
        CACHE_PROFILE: ${{ inputs.cache-profile }}
        CACHE_VERSION: ${{ inputs.cache-version }}
        SWIFT_MK_CI_GATE: ${{ inputs.gate }}
        DEPENDENCY_HASH: ${{ steps.dependency-hash.outputs.value }}
        BUILD_HASH: ${{ hashFiles('Package.swift', 'Package.resolved', 'Project.swift', 'Workspace.swift', 'Tuist.swift', 'Tuist/Package.swift', 'Tuist/Package.resolved', 'Tools/Package.swift', 'Tools/Package.resolved', 'swiftcheck/Package.swift', 'swiftcheck/Package.resolved', 'project.yml', 'Makefile') }}
        EXTRA_CACHE_PATHS: ${{ inputs.extra-cache-paths }}
      run: |
        set -euo pipefail
        bin="${HOME}/.swift-mk-ci-toolchain/swift-mk"

        build_engine() {
            # Remove any stale binary a non-clean runner or a poisoned cache left, so the
            # rebuild cannot be skipped by swift-mk-build.sh's mtime check.
            rm -rf "${HOME}/.swift-mk-ci-toolchain"
            SWIFT_MK_BIN="${bin}" SWIFT_MK_BUILD_REPO="${SWIFT_MK_SRC}" \
                bash "${SWIFT_MK_SRC}/scripts/swift-mk-build.sh" resolve
        }

        if [ "${TOOLCHAIN_CACHE_HIT}" = "true" ] && [ -x "${bin}" ]; then
            # Real cache hit (the key pins the engine source and Xcode bundle, so the
            # cached binary matches). Clear the provenance xattr and re-sign so a restored
            # arm64 binary is not killed on launch.
            xattr -c "${bin}" 2>/dev/null || true
            codesign --force --sign - "${bin}" >/dev/null 2>&1 || true
            # Verify the restored binary actually launches under the active toolchain.
            # A binary built against a different Xcode bundle links libIndexStore by
            # @rpath into that bundle and aborts on launch (SIGABRT, exit 134). The key
            # already folds the bundle path in to prevent that, so this is the safety
            # net: if a cached binary ever cannot launch, discard it and rebuild rather
            # than aborting the whole run. `swift-mk --help` is an ArgumentParser
            # built-in that exits 0 whenever the process launches, so treat ANY non-zero
            # (a dyld abort, an exec-format or arch mismatch, or any launch failure) as a
            # failed probe and rebuild.
            set +e
            "${bin}" --help >/dev/null 2>&1
            probe_rc=$?
            set -e
            if [ "${probe_rc}" -ne 0 ]; then
                echo "cached swift-mk failed to launch (exit ${probe_rc}); rebuilding against the active toolchain"
                build_engine
            fi
        else
            build_engine
        fi
        "${bin}" cache plan

    - name: Restore dependency cache
      if: steps.cache-plan.outputs.dependency-cache-enabled == 'true' && env.SWIFT_MK_POOL != '1'
      uses: actions/cache@v5
      with:
        path: ${{ steps.cache-plan.outputs.dependency-paths }}
        key: ${{ steps.cache-plan.outputs.dependency-key }}
        restore-keys: ${{ steps.cache-plan.outputs.dependency-restore-keys }}

    - name: Restore build intermediate cache
      if: steps.cache-plan.outputs.build-cache-enabled == 'true' && env.SWIFT_MK_POOL != '1'
      uses: actions/cache@v5
      with:
        path: ${{ steps.cache-plan.outputs.build-paths }}
        key: ${{ steps.cache-plan.outputs.build-key }}
        restore-keys: ${{ steps.cache-plan.outputs.build-restore-keys }}

    # The compile cache (the CAS store) is a rolling pile: the key carries a unique
    # run value so it never collides, so the post-job save always lands, and the build
    # adds its compiled results to the latest pile the restore-keys prefix found. Only a
    # compiling gate enables this (compile-cache-enabled), so a lint gate can never save
    # an empty pile over a full one. Restore-keys prefer this gate's own latest pile,
    # then any sibling gate's pile for the same dependencies.
    - name: Restore and roll compile cache
      if: steps.cache-plan.outputs.compile-cache-enabled == 'true' && env.SWIFT_MK_POOL != '1'
      uses: actions/cache@v5
      with:
        path: ${{ steps.cache-plan.outputs.compile-paths }}
        key: ${{ steps.cache-plan.outputs.compile-key }}
        restore-keys: ${{ steps.cache-plan.outputs.compile-restore-keys }}

    # Tuist arrives through mise, so it only applies to repos that declare a
    # toolchain; an xcodegen-only consumer has no .tool-versions and must not
    # fail on a tuist check.
    # The shared tool pins live in swift-makefile's mise.toml and are fetched
    # into .config/mise/conf.d/ (gitignored), so the gate keys on the tuist
    # manifests and any local mise config rather than a root pin file, and the
    # shared config is materialized here before `mise install` runs.
    - name: Install mise and Tuist
      if: ${{ env.SWIFT_MK_POOL != '1' && (inputs.install-tuist == 'true' || (inputs.install-tuist == 'auto' && hashFiles('.tool-versions', 'mise.toml', 'Project.swift', 'Workspace.swift', 'Tuist.swift') != '')) }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        curl https://mise.run | sh
        {
            printf '%s\n' "$HOME/.local/share/mise/bin"
            printf '%s\n' "$HOME/.local/share/mise/shims"
        } >> "$GITHUB_PATH"

        export PATH="$HOME/.local/share/mise/bin:$HOME/.local/share/mise/shims:$PATH"

        if [ ! -f .config/mise/conf.d/swift-mk.toml ]; then
            mkdir -p .config/mise/conf.d
            if [ "${GITHUB_REPOSITORY##*/}" = "swift-makefile" ] && [ -f mise.toml ]; then
                cp mise.toml .config/mise/conf.d/swift-mk.toml
            else
                curl -fsSL https://raw.githubusercontent.com/agoodkind/swift-makefile/main/mise.toml \
                    -o .config/mise/conf.d/swift-mk.toml
            fi
        fi
        mise trust .config/mise/conf.d/swift-mk.toml

        mise install
        tuist version

    - name: Install XcodeGen
      if: ${{ env.SWIFT_MK_POOL != '1' && (inputs.install-xcodegen == 'true' || (inputs.install-xcodegen == 'auto' && hashFiles('project.yml') != '')) }}
      shell: bash
      run: |
        set -euo pipefail

        if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
        fi

        xcodegen --version

    - name: Install Swift lint and analysis tools
      # Runs on the pool too: the golden image ships Xcode but not the lint and
      # analysis tools. The command -v check makes this a fast skip when a
      # future image preinstalls them.
      if: ${{ inputs.install-lint-tools == 'true' }}
      shell: bash
      run: |
        set -euo pipefail

        # The runner image's brew index is stale, so without an update the
        # bottles lag the current formulae and CI lints with a different tool
        # version than the fleet's local machines (a one-patch SwiftLint skew
        # produced 153 phantom findings). Update once, then upgrade or install.
        brew update --quiet

        for tool in swift-format swiftlint periphery osv-scanner; do
            if command -v "$tool" >/dev/null 2>&1; then
                brew upgrade "$tool" 2>/dev/null || true
            else
                brew install "$tool"
            fi
        done

        swift-format --version
        swiftlint version
        periphery version
        osv-scanner --version

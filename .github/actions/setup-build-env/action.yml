name: Setup Swift build env
description: Select Xcode and install the generator and analysis tools a consumer declares, with shared Tuist/SwiftPM and build caches.

inputs:
  xcode-version:
    description: Xcode version to select on the runner.
    required: true
  github-token:
    description: GitHub token used by mise for authenticated GitHub API requests.
    required: true
  install-tuist:
    description: >-
      Install Tuist via mise. "auto" installs only when the repo has a
      .tool-versions file; "true"/"false" force.
    required: false
    default: auto
  install-xcodegen:
    description: >-
      Install XcodeGen via brew. "auto" installs only when the repo has a
      project.yml; "true"/"false" force.
    required: false
    default: auto
  install-lint-tools:
    description: Install swift-format, swiftlint, periphery, and osv-scanner.
    required: false
    default: "true"
  extra-cache-paths:
    description: Newline-separated extra paths appended to the build cache.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ inputs.xcode-version }}

    - name: Restore Tuist and SwiftPM caches
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/tuist
          ~/.local/share/mise/downloads
          ~/.local/share/mise/installs
          ~/.local/share/mise/plugins
          Tuist/.build
        key: ${{ runner.os }}-tuist-${{ hashFiles('Tuist/Package.swift', 'Tuist/Package.resolved', '.tool-versions') }}
        restore-keys: |
          ${{ runner.os }}-tuist-

    - name: Restore build cache
      uses: actions/cache@v5
      with:
        path: |
          build
          ${{ inputs.extra-cache-paths }}
        key: ${{ runner.os }}-build-${{ hashFiles('Sources/**', 'Tests/**', 'Project.swift', 'Workspace.swift', 'Tuist.swift', 'Tuist/Package.swift', 'Tuist/Package.resolved', 'Config/**', 'Scripts/**', 'Templates/**', 'Makefile') }}
        restore-keys: |
          ${{ runner.os }}-build-

    # Tuist arrives through mise, so it only applies to repos that declare a
    # toolchain; an xcodegen-only consumer has no .tool-versions and must not
    # fail on a tuist check.
    - name: Install mise and Tuist
      if: ${{ inputs.install-tuist == 'true' || (inputs.install-tuist == 'auto' && hashFiles('.tool-versions') != '') }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        curl https://mise.run | sh
        {
            printf '%s\n' "$HOME/.local/share/mise/bin"
            printf '%s\n' "$HOME/.local/share/mise/shims"
        } >> "$GITHUB_PATH"

        export PATH="$HOME/.local/share/mise/bin:$HOME/.local/share/mise/shims:$PATH"
        mise install
        tuist version

    - name: Install XcodeGen
      if: ${{ inputs.install-xcodegen == 'true' || (inputs.install-xcodegen == 'auto' && hashFiles('project.yml') != '') }}
      shell: bash
      run: |
        set -euo pipefail

        if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
        fi

        xcodegen --version

    - name: Install Swift lint and analysis tools
      if: ${{ inputs.install-lint-tools == 'true' }}
      shell: bash
      run: |
        set -euo pipefail

        # The runner image's brew index is stale, so without an update the
        # bottles lag the current formulae and CI lints with a different tool
        # version than the fleet's local machines (a one-patch SwiftLint skew
        # produced 153 phantom findings). Update once, then upgrade or install.
        brew update --quiet

        for tool in swift-format swiftlint periphery osv-scanner; do
            if command -v "$tool" >/dev/null 2>&1; then
                brew upgrade "$tool" 2>/dev/null || true
            else
                brew install "$tool"
            fi
        done

        swift-format --version
        swiftlint version
        periphery version
        osv-scanner --version

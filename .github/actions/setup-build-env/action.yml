name: Setup Swift build env
description: Select Xcode and install the generator and analysis tools a consumer declares, with shared dependency and build-intermediate caches.

inputs:
  xcode-version:
    description: Xcode version to select on the runner.
    required: true
  github-token:
    description: GitHub token used by mise for authenticated GitHub API requests.
    required: true
  install-tuist:
    description: >-
      Install Tuist via mise. "auto" installs only when the repo has a
      .tool-versions file; "true"/"false" force.
    required: false
    default: auto
  install-xcodegen:
    description: >-
      Install XcodeGen via brew. "auto" installs only when the repo has a
      project.yml; "true"/"false" force.
    required: false
    default: auto
  install-lint-tools:
    description: Install swift-format, swiftlint, periphery, and osv-scanner.
    required: false
    default: "true"
  cache-profile:
    description: >-
      Cache profile. "safe" restores dependencies and build intermediates,
      "dependencies" restores only dependency caches, and "off" disables caches.
    required: false
    default: safe
  cache-version:
    description: Manual namespace for canonical cache invalidation.
    required: false
    default: v1
  extra-cache-paths:
    description: >-
      Newline-separated non-secret, non-final-artifact paths appended to the
      safe build-intermediate cache.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ inputs.xcode-version }}

    - name: Compute cache plan
      id: cache-plan
      shell: bash
      env:
        CACHE_PROFILE: ${{ inputs.cache-profile }}
        CACHE_VERSION: ${{ inputs.cache-version }}
        DEPENDENCY_HASH: ${{ hashFiles('Package.swift', 'Package.resolved', 'Tuist/Package.swift', 'Tuist/Package.resolved', 'Tools/Package.swift', 'Tools/Package.resolved', 'swiftcheck/Package.swift', 'swiftcheck/Package.resolved', '.tool-versions', 'mise.toml', '.config/mise/conf.d/*.toml', 'project.yml') }}
        BUILD_HASH: ${{ hashFiles('Package.swift', 'Package.resolved', 'Project.swift', 'Workspace.swift', 'Tuist.swift', 'Tuist/Package.swift', 'Tuist/Package.resolved', 'Tools/Package.swift', 'Tools/Package.resolved', 'swiftcheck/Package.swift', 'swiftcheck/Package.resolved', 'project.yml', 'Makefile') }}
        EXTRA_CACHE_PATHS: ${{ inputs.extra-cache-paths }}
      run: bash "${GITHUB_ACTION_PATH}/cache-plan.sh"

    - name: Restore dependency cache
      if: steps.cache-plan.outputs.dependency-cache-enabled == 'true'
      uses: actions/cache@v5
      with:
        path: ${{ steps.cache-plan.outputs.dependency-paths }}
        key: ${{ steps.cache-plan.outputs.dependency-key }}
        restore-keys: ${{ steps.cache-plan.outputs.dependency-restore-keys }}

    - name: Restore build intermediate cache
      if: steps.cache-plan.outputs.build-cache-enabled == 'true'
      uses: actions/cache@v5
      with:
        path: ${{ steps.cache-plan.outputs.build-paths }}
        key: ${{ steps.cache-plan.outputs.build-key }}
        restore-keys: ${{ steps.cache-plan.outputs.build-restore-keys }}

    # Tuist arrives through mise, so it only applies to repos that declare a
    # toolchain; an xcodegen-only consumer has no .tool-versions and must not
    # fail on a tuist check.
    # The shared tool pins live in swift-makefile's mise.toml and are fetched
    # into .config/mise/conf.d/ (gitignored), so the gate keys on the tuist
    # manifests and any local mise config rather than a root pin file, and the
    # shared config is materialized here before `mise install` runs.
    - name: Install mise and Tuist
      if: ${{ inputs.install-tuist == 'true' || (inputs.install-tuist == 'auto' && hashFiles('.tool-versions', 'mise.toml', 'Project.swift', 'Workspace.swift', 'Tuist.swift') != '') }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        curl https://mise.run | sh
        {
            printf '%s\n' "$HOME/.local/share/mise/bin"
            printf '%s\n' "$HOME/.local/share/mise/shims"
        } >> "$GITHUB_PATH"

        export PATH="$HOME/.local/share/mise/bin:$HOME/.local/share/mise/shims:$PATH"

        if [ ! -f .config/mise/conf.d/swift-mk.toml ]; then
            mkdir -p .config/mise/conf.d
            if [ "${GITHUB_REPOSITORY##*/}" = "swift-makefile" ] && [ -f mise.toml ]; then
                cp mise.toml .config/mise/conf.d/swift-mk.toml
            else
                curl -fsSL https://raw.githubusercontent.com/agoodkind/swift-makefile/main/mise.toml \
                    -o .config/mise/conf.d/swift-mk.toml
            fi
        fi
        mise trust .config/mise/conf.d/swift-mk.toml

        mise install
        tuist version

    - name: Install XcodeGen
      if: ${{ inputs.install-xcodegen == 'true' || (inputs.install-xcodegen == 'auto' && hashFiles('project.yml') != '') }}
      shell: bash
      run: |
        set -euo pipefail

        if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
        fi

        xcodegen --version

    - name: Install Swift lint and analysis tools
      if: ${{ inputs.install-lint-tools == 'true' }}
      shell: bash
      run: |
        set -euo pipefail

        # The runner image's brew index is stale, so without an update the
        # bottles lag the current formulae and CI lints with a different tool
        # version than the fleet's local machines (a one-patch SwiftLint skew
        # produced 153 phantom findings). Update once, then upgrade or install.
        brew update --quiet

        for tool in swift-format swiftlint periphery osv-scanner; do
            if command -v "$tool" >/dev/null 2>&1; then
                brew upgrade "$tool" 2>/dev/null || true
            else
                brew install "$tool"
            fi
        done

        swift-format --version
        swiftlint version
        periphery version
        osv-scanner --version

name: Notarize and staple
description: >-
  Notarize and staple artifacts through `swift-mk notarize`, the one canonical
  notarization channel. The engine is built from main here (revision-cached)
  because the notarize job runs with no checkout of its own.

inputs:
  artifact-path:
    description: >-
      Whitespace- or newline-separated paths of the .dmg, .pkg, or .zip files
      to notarize and staple. A single path keeps working.
    required: true
  notary-key-base64:
    description: Base64-encoded App Store Connect API .p8 key.
    required: true
  notary-key-id:
    description: App Store Connect API key id.
    required: true
  notary-issuer-id:
    description: App Store Connect API issuer id (UUID).
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        repository: agoodkind/swift-makefile
        ref: main
        path: .swift-mk-notarize-src

    - name: Resolve engine revision
      id: engine
      shell: bash
      run: |
        set -euo pipefail
        echo "rev=$(git -C .swift-mk-notarize-src rev-parse HEAD)" >> "$GITHUB_OUTPUT"

    - uses: actions/cache@v5
      with:
        path: .swift-mk-notarize-bin
        key: swift-mk-notarize-${{ runner.os }}-${{ steps.engine.outputs.rev }}

    - name: Build swift-mk if not cached
      shell: bash
      run: |
        set -euo pipefail

        if [ -x .swift-mk-notarize-bin/swift-mk ]; then
            exit 0
        fi
        swift build --package-path .swift-mk-notarize-src -c release --product swift-mk
        bin_dir="$(swift build --package-path .swift-mk-notarize-src -c release --show-bin-path)"
        mkdir -p .swift-mk-notarize-bin
        cp "$bin_dir/swift-mk" .swift-mk-notarize-bin/swift-mk

    - name: Notarize and staple
      shell: bash
      env:
        ARTIFACT_PATH: ${{ inputs.artifact-path }}
        APPLE_NOTARY_KEY_BASE64: ${{ inputs.notary-key-base64 }}
        APPLE_NOTARY_KEY_ID: ${{ inputs.notary-key-id }}
        APPLE_NOTARY_ISSUER_ID: ${{ inputs.notary-issuer-id }}
      run: |
        set -euo pipefail

        if [[ -z "${ARTIFACT_PATH// /}" ]]; then
            echo "notarize-staple: no artifacts to notarize" >&2
            exit 1
        fi

        # shellcheck disable=SC2086
        .swift-mk-notarize-bin/swift-mk notarize $ARTIFACT_PATH

name: CI gate
description: Run one swift-makefile CI gate after the caller checks out the repo and helpers.

inputs:
  gate:
    description: build, test, or extra-targets.
    required: true
  xcode-version:
    description: Xcode version to select on the runner.
    required: false
    default: latest-stable
  targets:
    description: Legacy JSON array alias for bespoke extra targets.
    required: false
    default: '["lint","build","test","audit"]'
  extra-targets:
    description: JSON array of bespoke make targets.
    required: false
    default: '[]'
  setup-target:
    description: Optional make target run before the selected gate.
    required: false
    default: ""
  make-args:
    description: Arguments appended verbatim to every make invocation.
    required: false
    default: ""
  brew-packages:
    description: Space-separated brew packages to install before the gate.
    required: false
    default: ""
  cache-profile:
    description: Cache profile passed to setup-build-env.
    required: false
    default: safe
  cache-version:
    description: Manual namespace for cache invalidation.
    required: false
    default: v1
  import-signing-cert:
    description: Whether to import a Developer ID certificate before building.
    required: false
    default: "false"
  install-provisioning-profile:
    description: Whether to install a Developer ID provisioning profile.
    required: false
    default: "false"
  signing-identity-name:
    description: Developer ID signing identity name.
    required: false
    default: ""
  apple-team-id:
    description: Apple Developer team ID.
    required: false
    default: ""
  extra-cache-paths:
    description: Newline-separated paths appended to the build cache plan.
    required: false
    default: ""
  apple-developer-id-p12-base64:
    description: Base64-encoded Developer ID certificate.
    required: false
    default: ""
  apple-developer-id-p12-password:
    description: Password for the Developer ID certificate.
    required: false
    default: ""
  apple-developer-id-profile-base64:
    description: Base64-encoded Developer ID provisioning profile.
    required: false
    default: ""
  apple-notary-key-base64:
    description: Base64-encoded App Store Connect API key.
    required: false
    default: ""
  apple-notary-key-id:
    description: App Store Connect API key ID.
    required: false
    default: ""
  apple-notary-issuer-id:
    description: App Store Connect API issuer ID.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Validate gate input
      shell: bash
      env:
        GATE: ${{ inputs.gate }}
      run: |
        case "${GATE}" in
          build | test | extra-targets) ;;
          *)
            printf 'unknown gate %s; expected build, test, or extra-targets\n' "${GATE}" >&2
            exit 1
            ;;
        esac

    - name: Resolve extra targets
      if: inputs.gate == 'extra-targets'
      id: resolve
      shell: bash
      env:
        EXTRA_TARGETS: ${{ inputs.extra-targets }}
        LEGACY_TARGETS: ${{ inputs.targets }}
        BUILTIN_TARGETS_JSON: '["build","test","lint","audit","build-check","quality-guard","lint-swiftlint","lint-format","lint-complexity","lint-deadcode","swiftcheck-extra"]'
      run: swift "${SWIFT_MK_HELPER_ROOT}/.github/actions/workflow-helper/workflow-helper.swift" resolve-extra-targets

    - name: Install brew packages
      if: ${{ (inputs.gate != 'extra-targets' || steps.resolve.outputs.count != '0') && inputs.brew-packages != '' }}
      shell: bash
      env:
        BREW_PACKAGES: ${{ inputs.brew-packages }}
      run: bash "${SWIFT_MK_HELPER_ROOT}/.github/actions/install-brew-packages/install-brew-packages.sh"

    - name: Setup Swift build env (swift-makefile)
      if: ${{ (inputs.gate != 'extra-targets' || steps.resolve.outputs.count != '0') && github.repository == 'agoodkind/swift-makefile' }}
      uses: ./.github/actions/setup-build-env
      with:
        xcode-version: ${{ inputs.xcode-version }}
        github-token: ${{ github.token }}
        cache-profile: ${{ inputs.cache-profile }}
        cache-version: ${{ inputs.cache-version }}
        extra-cache-paths: ${{ inputs.extra-cache-paths }}
        gate: ${{ inputs.gate }}

    - name: Setup Swift build env
      if: ${{ (inputs.gate != 'extra-targets' || steps.resolve.outputs.count != '0') && github.repository != 'agoodkind/swift-makefile' }}
      uses: agoodkind/swift-makefile/.github/actions/setup-build-env@main
      with:
        xcode-version: ${{ inputs.xcode-version }}
        github-token: ${{ github.token }}
        cache-profile: ${{ inputs.cache-profile }}
        cache-version: ${{ inputs.cache-version }}
        extra-cache-paths: ${{ inputs.extra-cache-paths }}
        gate: ${{ inputs.gate }}

    - name: Validate signing inputs
      if: ${{ (inputs.gate != 'extra-targets' || steps.resolve.outputs.count != '0') && (inputs.import-signing-cert == 'true' || inputs.install-provisioning-profile == 'true') }}
      shell: bash
      env:
        IMPORT_SIGNING_CERT: ${{ inputs.import-signing-cert }}
        INSTALL_PROVISIONING_PROFILE: ${{ inputs.install-provisioning-profile }}
        HAS_SIGNING_CERT: ${{ inputs.apple-developer-id-p12-base64 != '' }}
        HAS_SIGNING_PASSWORD: ${{ inputs.apple-developer-id-p12-password != '' }}
        HAS_PROVISIONING_PROFILE: ${{ inputs.apple-developer-id-profile-base64 != '' }}
      run: swift "${SWIFT_MK_HELPER_ROOT}/.github/actions/workflow-helper/workflow-helper.swift" validate-signing-inputs

    - name: Install signing certificate (swift-makefile)
      id: cert-local
      if: ${{ (inputs.gate != 'extra-targets' || steps.resolve.outputs.count != '0') && inputs.import-signing-cert == 'true' && github.repository == 'agoodkind/swift-makefile' }}
      uses: ./.github/actions/import-signing-cert
      with:
        p12-base64: ${{ inputs.apple-developer-id-p12-base64 }}
        p12-password: ${{ inputs.apple-developer-id-p12-password }}
        identity-name: ${{ inputs.signing-identity-name }}

    - name: Install signing certificate
      id: cert-remote
      if: ${{ (inputs.gate != 'extra-targets' || steps.resolve.outputs.count != '0') && inputs.import-signing-cert == 'true' && github.repository != 'agoodkind/swift-makefile' }}
      uses: agoodkind/swift-makefile/.github/actions/import-signing-cert@main
      with:
        p12-base64: ${{ inputs.apple-developer-id-p12-base64 }}
        p12-password: ${{ inputs.apple-developer-id-p12-password }}
        identity-name: ${{ inputs.signing-identity-name }}

    - name: Install provisioning profile (swift-makefile)
      id: profile-local
      if: ${{ (inputs.gate != 'extra-targets' || steps.resolve.outputs.count != '0') && inputs.install-provisioning-profile == 'true' && github.repository == 'agoodkind/swift-makefile' }}
      uses: ./.github/actions/install-provisioning-profile
      with:
        profile-base64: ${{ inputs.apple-developer-id-profile-base64 }}

    - name: Install provisioning profile
      id: profile-remote
      if: ${{ (inputs.gate != 'extra-targets' || steps.resolve.outputs.count != '0') && inputs.install-provisioning-profile == 'true' && github.repository != 'agoodkind/swift-makefile' }}
      uses: agoodkind/swift-makefile/.github/actions/install-provisioning-profile@main
      with:
        profile-base64: ${{ inputs.apple-developer-id-profile-base64 }}

    - name: Run setup target
      if: ${{ (inputs.gate != 'extra-targets' || steps.resolve.outputs.count != '0') && inputs.setup-target != '' }}
      shell: bash
      env:
        MAKE_TARGET: ${{ inputs.setup-target }}
        MAKE_ARGS: ${{ inputs.make-args }}
        CERT_SHA1: ${{ steps.cert-local.outputs.identity-sha1 || steps.cert-remote.outputs.identity-sha1 }}
        TEAM_ID: ${{ inputs.apple-team-id }}
        PROVISIONING_PROFILE_SPECIFIER: ${{ steps.profile-local.outputs.profile-specifier || steps.profile-remote.outputs.profile-specifier }}
        APPLE_NOTARY_KEY_BASE64: ${{ inputs.apple-notary-key-base64 }}
        APPLE_NOTARY_KEY_ID: ${{ inputs.apple-notary-key-id }}
        APPLE_NOTARY_ISSUER_ID: ${{ inputs.apple-notary-issuer-id }}
      run: swift "${SWIFT_MK_HELPER_ROOT}/.github/actions/workflow-helper/workflow-helper.swift" run-make-with-signing

    - name: Run build
      if: ${{ inputs.gate == 'build' }}
      shell: bash
      env:
        MAKE_TARGET: build
        MAKE_ARGS: ${{ inputs.make-args }}
        CERT_SHA1: ${{ steps.cert-local.outputs.identity-sha1 || steps.cert-remote.outputs.identity-sha1 }}
        TEAM_ID: ${{ inputs.apple-team-id }}
        PROVISIONING_PROFILE_SPECIFIER: ${{ steps.profile-local.outputs.profile-specifier || steps.profile-remote.outputs.profile-specifier }}
        APPLE_NOTARY_KEY_BASE64: ${{ inputs.apple-notary-key-base64 }}
        APPLE_NOTARY_KEY_ID: ${{ inputs.apple-notary-key-id }}
        APPLE_NOTARY_ISSUER_ID: ${{ inputs.apple-notary-issuer-id }}
      run: swift "${SWIFT_MK_HELPER_ROOT}/.github/actions/workflow-helper/workflow-helper.swift" run-make-with-signing

    - name: Run test
      if: ${{ inputs.gate == 'test' }}
      shell: bash
      env:
        MAKE_TARGET: test
        MAKE_ARGS: ${{ inputs.make-args }}
        CERT_SHA1: ${{ steps.cert-local.outputs.identity-sha1 || steps.cert-remote.outputs.identity-sha1 }}
        TEAM_ID: ${{ inputs.apple-team-id }}
        PROVISIONING_PROFILE_SPECIFIER: ${{ steps.profile-local.outputs.profile-specifier || steps.profile-remote.outputs.profile-specifier }}
        APPLE_NOTARY_KEY_BASE64: ${{ inputs.apple-notary-key-base64 }}
        APPLE_NOTARY_KEY_ID: ${{ inputs.apple-notary-key-id }}
        APPLE_NOTARY_ISSUER_ID: ${{ inputs.apple-notary-issuer-id }}
      run: swift "${SWIFT_MK_HELPER_ROOT}/.github/actions/workflow-helper/workflow-helper.swift" run-make-with-signing

    - name: Run extra targets
      if: ${{ inputs.gate == 'extra-targets' && steps.resolve.outputs.count != '0' }}
      shell: bash
      env:
        MAKE_ARGS: ${{ inputs.make-args }}
        CERT_SHA1: ${{ steps.cert-local.outputs.identity-sha1 || steps.cert-remote.outputs.identity-sha1 }}
        TEAM_ID: ${{ inputs.apple-team-id }}
        PROVISIONING_PROFILE_SPECIFIER: ${{ steps.profile-local.outputs.profile-specifier || steps.profile-remote.outputs.profile-specifier }}
        APPLE_NOTARY_KEY_BASE64: ${{ inputs.apple-notary-key-base64 }}
        APPLE_NOTARY_KEY_ID: ${{ inputs.apple-notary-key-id }}
        APPLE_NOTARY_ISSUER_ID: ${{ inputs.apple-notary-issuer-id }}
        EXTRA_TARGETS_SHELL: ${{ steps.resolve.outputs.targets_shell }}
      run: swift "${SWIFT_MK_HELPER_ROOT}/.github/actions/workflow-helper/workflow-helper.swift" run-extra-targets

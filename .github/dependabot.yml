version: 2
updates:
  - package-ecosystem: swift
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      swift-minor-patch:
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 5
    reviewers:
      - agoodkind

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns:
          - "*"
    open-pull-requests-limit: 3
    reviewers:
      - agoodkind

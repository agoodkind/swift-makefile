# Reusable Swift CI. Consumers declare setup plus optional bespoke extra
# targets; the required Build, Test, and Quality gates live here. Triggers live
# in the caller (GitHub does not allow them here).
name: CI

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: macos-latest
      xcode-version:
        type: string
        default: latest-stable
      # Legacy JSON array alias for bespoke extra targets. Required Build, Test,
      # and Quality jobs now run unconditionally here.
      targets:
        type: string
        default: '["lint","build","test","audit"]'
      # Optional JSON array of bespoke make targets that run after the shared
      # required jobs.
      extra-targets:
        type: string
        default: '[]'
      # Optional make target run before each required job and once before the
      # extra-target batch.
      setup-target:
        type: string
        default: ""
      # Appended verbatim to every make invocation (e.g. CODE_SIGN_IDENTITY=-).
      make-args:
        type: string
        default: ""
      brew-packages:
        type: string
        default: ""
      cache-profile:
        type: string
        default: safe
      cache-version:
        type: string
        default: v1
      # Import a real Developer ID certificate before building (requires the
      # APPLE_DEVELOPER_ID_P12_* secrets; silently skipped when absent).
      import-signing-cert:
        type: boolean
        default: false
      # Install a Developer ID provisioning profile before building, for apps
      # with entitlements that require one (iCloud). Requires the
      # APPLE_DEVELOPER_ID_PROFILE_BASE64 secret; silently skipped when absent.
      install-provisioning-profile:
        type: boolean
        default: false
      signing-identity-name:
        type: string
        default: ""
      apple-team-id:
        type: string
        default: ""
      extra-cache-paths:
        type: string
        default: ""
      fetch-depth:
        type: string
        default: "1"
      timeout-minutes:
        type: number
        default: 30
    secrets:
      APPLE_DEVELOPER_ID_P12_BASE64:
        required: false
      APPLE_DEVELOPER_ID_P12_PASSWORD:
        required: false
      APPLE_DEVELOPER_ID_PROFILE_BASE64:
        required: false
      # App Store Connect API key for iOS automatic signing
      # (`xcodebuild -allowProvisioningUpdates`). The consumer's build reads
      # these from the environment, the same names `_release.yml` uses for
      # notarization. Absent, the build does no automatic signing, which a
      # simulator build never needs.
      APPLE_NOTARY_KEY_BASE64:
        required: false
      APPLE_NOTARY_KEY_ID:
        required: false
      APPLE_NOTARY_ISSUER_ID:
        required: false

env:
  # The swift-makefile bootstrap fetches swift.mk via `gh api`; unauthenticated
  # fetches fail silently, so every consumer needs this token.
  GH_TOKEN: ${{ github.token }}
  # GitHub's macOS runners currently ship with untrusted third-party taps
  # preinstalled, which makes unrelated `brew install` and `brew update` calls
  # fail closed unless the job disables the new trust gate explicitly.
  HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"

jobs:
  quality:
    name: Quality / ${{ matrix.name }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    env:
      SWIFT_MK_HELPER_ROOT: ${{ github.repository == 'agoodkind/swift-makefile' && '.' || '.swift-makefile' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: SwiftLint
            target: lint-swiftlint
          - name: Format
            target: lint-format
          - name: Complexity
            target: lint-complexity
          - name: Deadcode
            target: lint-deadcode
          - name: Swiftcheck Extra
            target: swiftcheck-extra
          - name: Audit
            target: audit
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch-depth }}

      - name: Checkout swift-makefile helpers
        if: github.repository != 'agoodkind/swift-makefile'
        uses: actions/checkout@v6
        with:
          repository: agoodkind/swift-makefile
          # The caller's github.sha names the consumer repo commit, not a
          # commit in swift-makefile, so the helper checkout follows the
          # same `@main` contract the reusable workflow already advertises.
          ref: main
          path: .swift-makefile
          fetch-depth: 1

      - name: Install brew packages
        if: inputs.brew-packages != ''
        env:
          BREW_PACKAGES: ${{ inputs.brew-packages }}
        run: bash "${SWIFT_MK_HELPER_ROOT}/.github/actions/install-brew-packages/install-brew-packages.sh"

      - name: Setup Swift build env
        if: github.repository == 'agoodkind/swift-makefile'
        uses: ./.github/actions/setup-build-env
        with:
          xcode-version: ${{ inputs.xcode-version }}
          github-token: ${{ github.token }}
          cache-profile: ${{ inputs.cache-profile }}
          cache-version: ${{ inputs.cache-version }}
          extra-cache-paths: ${{ inputs.extra-cache-paths }}

      - name: Setup Swift build env
        if: github.repository != 'agoodkind/swift-makefile'
        uses: agoodkind/swift-makefile/.github/actions/setup-build-env@main
        with:
          xcode-version: ${{ inputs.xcode-version }}
          github-token: ${{ github.token }}
          cache-profile: ${{ inputs.cache-profile }}
          cache-version: ${{ inputs.cache-version }}
          extra-cache-paths: ${{ inputs.extra-cache-paths }}

      - name: Run setup target
        if: inputs.setup-target != ''
        env:
          MAKE_TARGET: ${{ inputs.setup-target }}
          MAKE_ARGS: ${{ inputs.make-args }}
          TEAM_ID: ${{ inputs.apple-team-id }}
        run: swift "${SWIFT_MK_HELPER_ROOT}/.github/actions/workflow-helper/workflow-helper.swift" run-make-with-team

      - name: Run shared quality guard
        env:
          MAKE_TARGET: quality-guard
          MAKE_ARGS: ${{ inputs.make-args }}
          TEAM_ID: ${{ inputs.apple-team-id }}
        run: swift "${SWIFT_MK_HELPER_ROOT}/.github/actions/workflow-helper/workflow-helper.swift" run-make-with-team

      - name: Run ${{ matrix.name }}
        env:
          MAKE_TARGET: ${{ matrix.target }}
          MAKE_ARGS: ${{ inputs.make-args }}
          TEAM_ID: ${{ inputs.apple-team-id }}
        run: swift "${SWIFT_MK_HELPER_ROOT}/.github/actions/workflow-helper/workflow-helper.swift" run-make-with-team

  build:
    name: Build
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    env:
      HAS_SIGNING: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 != '' }}
      HAS_PROFILE: ${{ secrets.APPLE_DEVELOPER_ID_PROFILE_BASE64 != '' }}
      SWIFT_MK_HELPER_ROOT: ${{ github.repository == 'agoodkind/swift-makefile' && '.' || '.swift-makefile' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch-depth }}

      - name: Checkout swift-makefile helpers
        if: github.repository != 'agoodkind/swift-makefile'
        uses: actions/checkout@v6
        with:
          repository: agoodkind/swift-makefile
          # The caller's github.sha names the consumer repo commit, not a
          # commit in swift-makefile, so the helper checkout follows the
          # same `@main` contract the reusable workflow already advertises.
          ref: main
          path: .swift-makefile
          fetch-depth: 1

      - name: Install brew packages
        if: inputs.brew-packages != ''
        env:
          BREW_PACKAGES: ${{ inputs.brew-packages }}
        run: bash "${SWIFT_MK_HELPER_ROOT}/.github/actions/install-brew-packages/install-brew-packages.sh"

      - name: Setup Swift build env
        if: github.repository == 'agoodkind/swift-makefile'
        uses: ./.github/actions/setup-build-env
        with:
          xcode-version: ${{ inputs.xcode-version }}
          github-token: ${{ github.token }}
          cache-profile: ${{ inputs.cache-profile }}
          cache-version: ${{ inputs.cache-version }}
          extra-cache-paths: ${{ inputs.extra-cache-paths }}

      - name: Setup Swift build env
        if: github.repository != 'agoodkind/swift-makefile'
        uses: agoodkind/swift-makefile/.github/actions/setup-build-env@main
        with:
          xcode-version: ${{ inputs.xcode-version }}
          github-token: ${{ github.token }}
          cache-profile: ${{ inputs.cache-profile }}
          cache-version: ${{ inputs.cache-version }}
          extra-cache-paths: ${{ inputs.extra-cache-paths }}

      - name: Install signing certificate
        id: cert
        if: ${{ inputs.import-signing-cert && env.HAS_SIGNING == 'true' }}
        uses: agoodkind/swift-makefile/.github/actions/import-signing-cert@main
        with:
          p12-base64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          identity-name: ${{ inputs.signing-identity-name }}

      - name: Install provisioning profile
        id: profile
        if: ${{ inputs.install-provisioning-profile && env.HAS_PROFILE == 'true' }}
        uses: agoodkind/swift-makefile/.github/actions/install-provisioning-profile@main
        with:
          profile-base64: ${{ secrets.APPLE_DEVELOPER_ID_PROFILE_BASE64 }}

      - name: Run setup target
        if: inputs.setup-target != ''
        env:
          MAKE_TARGET: ${{ inputs.setup-target }}
          MAKE_ARGS: ${{ inputs.make-args }}
          CERT_SHA1: ${{ steps.cert.outputs.identity-sha1 }}
          TEAM_ID: ${{ inputs.apple-team-id }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ steps.profile.outputs.profile-specifier }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: swift "${SWIFT_MK_HELPER_ROOT}/.github/actions/workflow-helper/workflow-helper.swift" run-make-with-signing

      - name: Run build
        env:
          MAKE_TARGET: build
          MAKE_ARGS: ${{ inputs.make-args }}
          CERT_SHA1: ${{ steps.cert.outputs.identity-sha1 }}
          TEAM_ID: ${{ inputs.apple-team-id }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ steps.profile.outputs.profile-specifier }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: swift "${SWIFT_MK_HELPER_ROOT}/.github/actions/workflow-helper/workflow-helper.swift" run-make-with-signing

  test:
    name: Test
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    env:
      HAS_SIGNING: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 != '' }}
      HAS_PROFILE: ${{ secrets.APPLE_DEVELOPER_ID_PROFILE_BASE64 != '' }}
      SWIFT_MK_HELPER_ROOT: ${{ github.repository == 'agoodkind/swift-makefile' && '.' || '.swift-makefile' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch-depth }}

      - name: Checkout swift-makefile helpers
        if: github.repository != 'agoodkind/swift-makefile'
        uses: actions/checkout@v6
        with:
          repository: agoodkind/swift-makefile
          # The caller's github.sha names the consumer repo commit, not a
          # commit in swift-makefile, so the helper checkout follows the
          # same `@main` contract the reusable workflow already advertises.
          ref: main
          path: .swift-makefile
          fetch-depth: 1

      - name: Install brew packages
        if: inputs.brew-packages != ''
        env:
          BREW_PACKAGES: ${{ inputs.brew-packages }}
        run: bash "${SWIFT_MK_HELPER_ROOT}/.github/actions/install-brew-packages/install-brew-packages.sh"

      - name: Setup Swift build env
        if: github.repository == 'agoodkind/swift-makefile'
        uses: ./.github/actions/setup-build-env
        with:
          xcode-version: ${{ inputs.xcode-version }}
          github-token: ${{ github.token }}
          cache-profile: ${{ inputs.cache-profile }}
          cache-version: ${{ inputs.cache-version }}
          extra-cache-paths: ${{ inputs.extra-cache-paths }}

      - name: Setup Swift build env
        if: github.repository != 'agoodkind/swift-makefile'
        uses: agoodkind/swift-makefile/.github/actions/setup-build-env@main
        with:
          xcode-version: ${{ inputs.xcode-version }}
          github-token: ${{ github.token }}
          cache-profile: ${{ inputs.cache-profile }}
          cache-version: ${{ inputs.cache-version }}
          extra-cache-paths: ${{ inputs.extra-cache-paths }}

      - name: Install signing certificate
        id: cert
        if: ${{ inputs.import-signing-cert && env.HAS_SIGNING == 'true' }}
        uses: agoodkind/swift-makefile/.github/actions/import-signing-cert@main
        with:
          p12-base64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          identity-name: ${{ inputs.signing-identity-name }}

      - name: Install provisioning profile
        id: profile
        if: ${{ inputs.install-provisioning-profile && env.HAS_PROFILE == 'true' }}
        uses: agoodkind/swift-makefile/.github/actions/install-provisioning-profile@main
        with:
          profile-base64: ${{ secrets.APPLE_DEVELOPER_ID_PROFILE_BASE64 }}

      - name: Run setup target
        if: inputs.setup-target != ''
        env:
          MAKE_TARGET: ${{ inputs.setup-target }}
          MAKE_ARGS: ${{ inputs.make-args }}
          CERT_SHA1: ${{ steps.cert.outputs.identity-sha1 }}
          TEAM_ID: ${{ inputs.apple-team-id }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ steps.profile.outputs.profile-specifier }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: swift "${SWIFT_MK_HELPER_ROOT}/.github/actions/workflow-helper/workflow-helper.swift" run-make-with-signing

      - name: Run test
        env:
          MAKE_TARGET: test
          MAKE_ARGS: ${{ inputs.make-args }}
          CERT_SHA1: ${{ steps.cert.outputs.identity-sha1 }}
          TEAM_ID: ${{ inputs.apple-team-id }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ steps.profile.outputs.profile-specifier }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: swift "${SWIFT_MK_HELPER_ROOT}/.github/actions/workflow-helper/workflow-helper.swift" run-make-with-signing

  extra-targets:
    name: Extra Targets
    needs: [quality, build, test]
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    env:
      HAS_SIGNING: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 != '' }}
      HAS_PROFILE: ${{ secrets.APPLE_DEVELOPER_ID_PROFILE_BASE64 != '' }}
      SWIFT_MK_HELPER_ROOT: ${{ github.repository == 'agoodkind/swift-makefile' && '.' || '.swift-makefile' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch-depth }}

      - name: Checkout swift-makefile helpers
        if: github.repository != 'agoodkind/swift-makefile'
        uses: actions/checkout@v6
        with:
          repository: agoodkind/swift-makefile
          # The caller's github.sha names the consumer repo commit, not a
          # commit in swift-makefile, so the helper checkout follows the
          # same `@main` contract the reusable workflow already advertises.
          ref: main
          path: .swift-makefile
          fetch-depth: 1

      - name: Resolve extra targets
        id: resolve_targets
        env:
          EXTRA_TARGETS: ${{ inputs.extra-targets }}
          LEGACY_TARGETS: ${{ inputs.targets }}
          BUILTIN_TARGETS_JSON: '["build","test","lint","audit","build-check","quality-guard","lint-swiftlint","lint-format","lint-complexity","lint-deadcode","swiftcheck-extra"]'
        run: swift "${SWIFT_MK_HELPER_ROOT}/.github/actions/workflow-helper/workflow-helper.swift" resolve-extra-targets

      - name: Install brew packages
        if: steps.resolve_targets.outputs.count != '0' && inputs.brew-packages != ''
        env:
          BREW_PACKAGES: ${{ inputs.brew-packages }}
        run: bash "${SWIFT_MK_HELPER_ROOT}/.github/actions/install-brew-packages/install-brew-packages.sh"

      - name: Setup Swift build env
        if: steps.resolve_targets.outputs.count != '0' && github.repository == 'agoodkind/swift-makefile'
        uses: ./.github/actions/setup-build-env
        with:
          xcode-version: ${{ inputs.xcode-version }}
          github-token: ${{ github.token }}
          cache-profile: ${{ inputs.cache-profile }}
          cache-version: ${{ inputs.cache-version }}
          extra-cache-paths: ${{ inputs.extra-cache-paths }}

      - name: Setup Swift build env
        if: steps.resolve_targets.outputs.count != '0' && github.repository != 'agoodkind/swift-makefile'
        uses: agoodkind/swift-makefile/.github/actions/setup-build-env@main
        with:
          xcode-version: ${{ inputs.xcode-version }}
          github-token: ${{ github.token }}
          cache-profile: ${{ inputs.cache-profile }}
          cache-version: ${{ inputs.cache-version }}
          extra-cache-paths: ${{ inputs.extra-cache-paths }}

      - name: Install signing certificate
        id: cert
        if: ${{ steps.resolve_targets.outputs.count != '0' && inputs.import-signing-cert && env.HAS_SIGNING == 'true' }}
        uses: agoodkind/swift-makefile/.github/actions/import-signing-cert@main
        with:
          p12-base64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          identity-name: ${{ inputs.signing-identity-name }}

      - name: Install provisioning profile
        id: profile
        if: ${{ steps.resolve_targets.outputs.count != '0' && inputs.install-provisioning-profile && env.HAS_PROFILE == 'true' }}
        uses: agoodkind/swift-makefile/.github/actions/install-provisioning-profile@main
        with:
          profile-base64: ${{ secrets.APPLE_DEVELOPER_ID_PROFILE_BASE64 }}

      - name: Run setup target
        if: steps.resolve_targets.outputs.count != '0' && inputs.setup-target != ''
        env:
          MAKE_TARGET: ${{ inputs.setup-target }}
          MAKE_ARGS: ${{ inputs.make-args }}
          CERT_SHA1: ${{ steps.cert.outputs.identity-sha1 }}
          TEAM_ID: ${{ inputs.apple-team-id }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ steps.profile.outputs.profile-specifier }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: swift "${SWIFT_MK_HELPER_ROOT}/.github/actions/workflow-helper/workflow-helper.swift" run-make-with-signing

      - name: Run extra targets
        if: steps.resolve_targets.outputs.count != '0'
        env:
          MAKE_ARGS: ${{ inputs.make-args }}
          CERT_SHA1: ${{ steps.cert.outputs.identity-sha1 }}
          TEAM_ID: ${{ inputs.apple-team-id }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ steps.profile.outputs.profile-specifier }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          EXTRA_TARGETS_SHELL: ${{ steps.resolve_targets.outputs.targets_shell }}
        run: swift "${SWIFT_MK_HELPER_ROOT}/.github/actions/workflow-helper/workflow-helper.swift" run-extra-targets

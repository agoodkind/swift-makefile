# Reusable Swift CI. Consumers declare setup plus optional bespoke extra
# targets; the required Build, Test, Quality, and Extra Targets gates live here.
# Dead-code analysis is not a CI gate: it needs an uncached compile that chokes
# the pool, so it runs only locally (enforced by LINT_GATES in swift.mk).
# Triggers live in the caller (GitHub does not allow them here).
name: CI

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: macos-latest
      xcode-version:
        type: string
        default: latest-stable
      # Legacy JSON array alias for bespoke extra targets. Required Build, Test,
      # and shared gate jobs now run unconditionally here.
      targets:
        type: string
        default: '["lint","build","test","audit"]'
      # Optional JSON array of bespoke make targets that run after the shared
      # required jobs.
      extra-targets:
        type: string
        default: '[]'
      # Build-relevant directories the detector cannot infer from the build graph, as a
      # whitespace-separated list of repo-root-relative paths (space or newline separated).
      extra-dirs:
        type: string
        default: ""
      # Optional make target run before each required job and once before the
      # extra-target batch.
      setup-target:
        type: string
        default: ""
      # Appended verbatim to every make invocation (e.g. CODE_SIGN_IDENTITY=-).
      make-args:
        type: string
        default: ""
      brew-packages:
        type: string
        default: ""
      cache-profile:
        type: string
        default: safe
      cache-version:
        type: string
        default: v1
      # Import a real Developer ID certificate before building. Requires the
      # APPLE_DEVELOPER_ID_P12_* secrets when enabled.
      import-signing-cert:
        type: boolean
        default: false
      # Install a Developer ID provisioning profile before building, for apps
      # with entitlements that require one (iCloud). Requires the
      # APPLE_DEVELOPER_ID_PROFILE_BASE64 secret when enabled.
      install-provisioning-profile:
        type: boolean
        default: false
      signing-identity-name:
        type: string
        default: ""
      apple-team-id:
        type: string
        default: ""
      extra-cache-paths:
        type: string
        default: ""
      fetch-depth:
        type: string
        default: "1"
      timeout-minutes:
        type: number
        # 60 leaves headroom for a one-time cold compile-cache populate. The SwiftPM
        # compile cache uses -explicit-module-build, whose cold build is slower than an
        # uncached build; the populate run must finish once to save the rolling cache so
        # later runs replay and drop well under this ceiling. This is a ceiling, not a
        # target, so a normal build still finishes early.
        default: 60
      # Self-hosted macOS pool support. When local-pool-capacity-url points at a
      # broker that reports available capacity, each macOS gate independently
      # prefers local-pool-label; otherwise that gate falls back to inputs.runner.
      # The URL defaults to the shared broker, so consumers need no configuration.
      # Set this to an empty string to force every gate to hosted.
      local-pool-capacity-url:
        type: string
        default: "https://darwin-gh-broker.silver-flare.com/capacity"
      # Runner label for the self-hosted pool. Ignored when the pool is
      # unavailable or local-pool-capacity-url is empty.
      local-pool-label:
        type: string
        default: agk-local-macos-26
    secrets:
      APPLE_DEVELOPER_ID_P12_BASE64:
        required: false
      APPLE_DEVELOPER_ID_P12_PASSWORD:
        required: false
      APPLE_DEVELOPER_ID_PROFILE_BASE64:
        required: false
      # App Store Connect API key for iOS automatic signing
      # (`xcodebuild -allowProvisioningUpdates`). The consumer's build reads
      # these from the environment, the same names `_release.yml` uses for
      # notarization. Absent, the build does no automatic signing, which a
      # simulator build never needs.
      APPLE_NOTARY_KEY_BASE64:
        required: false
      APPLE_NOTARY_KEY_ID:
        required: false
      APPLE_NOTARY_ISSUER_ID:
        required: false
      # Bearer token for the self-hosted pool's guarded /capacity endpoint. When
      # set (alongside local-pool-capacity-url) plan-runners authenticates the
      # capacity check; absent or wrong, the broker returns 401 and the gate
      # falls back to hosted, so CI is never blocked.
      LOCAL_POOL_CAPACITY_TOKEN:
        required: false

env:
  # The swift-makefile bootstrap fetches swift.mk via `gh api`; unauthenticated
  # fetches fail silently, so every consumer needs this token.
  GH_TOKEN: ${{ github.token }}
  # GitHub's macOS runners currently ship with untrusted third-party taps
  # preinstalled, which makes unrelated `brew install` and `brew update` calls
  # fail closed unless the job disables the new trust gate explicitly.
  HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
  # The ci-diagnostics PR label turns on swift-mk debug logging across every job
  # in this workflow (changes, the aggregators, and anything else that runs
  # swift-mk). Empty keeps unlabeled runs at swift-mk's default quiet level. The
  # macOS system capture is added only on the gate job in _ci-gate.yml.
  SWIFT_MK_LOG_LEVEL: ${{ contains(github.event.pull_request.labels.*.name, 'ci-diagnostics') && 'debug' || '' }}

jobs:
  # changes: change-detection runs on a free ubuntu-latest runner instead of a
  # scarce macOS pool slot. `swift-mk ci-changed` only diffs files with git and
  # classifies paths: a generated-project consumer takes the nil-graph path and
  # needs only git, while the swift-makefile engine repo also runs
  # `swift package describe`, which the Linux Swift toolchain in the container
  # provides. So change-detection needs no macOS toolchain, and moving it off the
  # pool frees one slot per run. It emits the same run/run_build/run_lint outputs
  # every downstream gate reads, and no longer depends on plan-runners or a build
  # label; plan-runners still runs for the real gates.
  #
  # The job is fail-safe: the Linux swift-mk build is best-effort, and the detect
  # step always runs and falls back to a full run (every output true) when the
  # binary is unavailable, so a transient Linux-build hiccup keeps the job green and
  # runs the full gate set rather than blocking CI or skipping a gate.
  changes:
    name: Changes
    runs-on: ubuntu-latest
    # The official Swift image ships the 6.3.x line the macOS CI runs plus git, so
    # the Linux swift-mk builds and `swift package describe` resolves with no
    # toolchain install; actions/checkout and actions/cache run unchanged inside it.
    container: swift:6.3
    timeout-minutes: ${{ inputs.timeout-minutes }}
    env:
      # Pin SwiftPM's cache to one absolute literal path so the cache step and the swift
      # process reference the identical location, instead of each resolving `~`/HOME on
      # its own (the container sets HOME to /github/home, but the cache action's tilde
      # expansion and swift's HOME are not guaranteed to agree). SwiftPM honors
      # XDG_CACHE_HOME, placing its clone cache at $XDG_CACHE_HOME/org.swift.swiftpm. A
      # literal path is required here because the `runner` context is not available in a
      # job-level env; the container filesystem is shared across steps, so /tmp persists
      # for the whole job.
      XDG_CACHE_HOME: /tmp/swiftpm-cache
      # Default the detector to info, overriding the workflow-level SWIFT_MK_LOG_LEVEL
      # (empty unless labeled) for this job only, so the detector's essential phase logs
      # (diff base, git diff, build-graph read, classification) always show. The
      # ci-diagnostics label still raises this to debug, matching the reusable gate's own
      # expression, so a labeled run additionally gets the per-git-call debug lines.
      SWIFT_MK_LOG_LEVEL: ${{ contains(github.event.pull_request.labels.*.name, 'ci-diagnostics') && 'debug' || 'info' }}
    permissions:
      contents: read
    outputs:
      run: ${{ steps.detect.outputs.run }}
      run_build: ${{ steps.detect.outputs.run_build }}
      run_lint: ${{ steps.detect.outputs.run_lint }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Credentials stay persisted (the default): the detector's feature-branch
          # merge-base can need `git fetch origin <default>`, which fails without auth on a
          # private repo and would disable skipping on feature branches.
          fetch-depth: 0

      - name: Trust the workspace for git
        shell: bash
        # This job runs in a container as root, but actions/checkout writes each working
        # tree as the runner UID. git then refuses to operate on it ("detected dubious
        # ownership") from any later step, because checkout only marks the tree safe in
        # its own temporary HOME. Without this, the detector's git calls (merge-base,
        # diff) and the engine checkout's build both fail. Trust every path in this
        # ephemeral container so the workspace and the .swift-makefile engine checkout
        # both work; the container is CI-controlled and discarded after the job.
        run: git config --global --add safe.directory '*'

      - name: Cache SwiftPM dependency resolution
        uses: actions/cache@v5
        with:
          # The detect step's `swift package describe` resolves the described repo's
          # dependency graph, cloning every dependency over the network when this cache
          # is cold. That resolve is the slow, occasionally stalling part of the changes
          # job. Cache SwiftPM's clone cache so the resolve reuses cloned repositories
          # instead of hitting the network. The path matches XDG_CACHE_HOME above, so the
          # cache action and swift agree on one literal location. Key on the manifests so
          # a dependency change rotates the key; restore-keys lets a manifest change still
          # restore the previous cache and update it rather than cold-clone. Package.resolved
          # is gitignored in swift-makefile's own repo, so hashFiles falls back to
          # Package.swift alone there.
          path: /tmp/swiftpm-cache/org.swift.swiftpm
          key: swiftpm-deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/Package.swift', '**/Package.resolved') }}
          restore-keys: |
            swiftpm-deps-${{ runner.os }}-${{ runner.arch }}-

      # Check out the swift-makefile engine at one uniform path so a single setup step
      # builds swift-mk for the engine and every consumer alike. A step's `uses:` cannot
      # take an expression, so the ref is what varies: the engine tests its own in-PR
      # action by checking out this run's sha, and consumers pin @main. This keeps
      # swift-makefile dogfooding its own action (its PR runs the PR's action) while
      # avoiding two near-duplicate setup steps guarded by github.repository.
      - name: Check out the swift-makefile engine
        uses: actions/checkout@v7
        with:
          repository: agoodkind/swift-makefile
          ref: ${{ github.repository == 'agoodkind/swift-makefile' && github.sha || 'main' }}
          path: .swift-makefile
          fetch-depth: 1

      # continue-on-error keeps a Linux swift-mk build failure from failing the job: the
      # detect step below falls back to a full run when the binary is missing.
      - name: Setup Linux swift-mk
        continue-on-error: true
        uses: ./.swift-makefile/.github/actions/setup-linux-swift-mk

      - name: Detect changes
        id: detect
        # always() so detection still runs (or fails safe) even when the setup step
        # above did not produce a usable binary.
        if: ${{ always() }}
        shell: bash
        env:
          # On a pull request, github.event.before is empty, github.ref_name is the merge
          # ref (<n>/merge), and github.sha is the synthetic merge commit. The pull-request
          # context (head sha, base branch, head branch) gives the detector a well-defined
          # branch head to diff against its base, so the merge-base path runs. On a push,
          # those pull-request fields are empty and the values fall back to the push context.
          SWIFT_MK_EVENT_NAME: ${{ github.event_name }}
          SWIFT_MK_DIFF_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
          SWIFT_MK_DIFF_BASE: ${{ github.event.before }}
          SWIFT_MK_DEFAULT_BRANCH: ${{ github.base_ref || github.event.repository.default_branch }}
          SWIFT_MK_REF_NAME: ${{ github.head_ref || github.ref_name }}
          SWIFT_MK_CI_EXTRA_DIRS: ${{ inputs.extra-dirs }}
        run: |
          set -uo pipefail

          # The detector itself always exits 0 and writes the outputs (it fail-safes
          # to all-true internally). The only way to reach the fallback below is a
          # missing or unrunnable binary, meaning the Linux build did not succeed.
          bin="${SWIFT_MK_BIN:-${HOME}/.swift-mk-ci-toolchain/swift-mk}"
          if [ -x "${bin}" ] && "${bin}" ci-changed; then
            exit 0
          fi

          echo "change detection unavailable (Linux swift-mk build failed); running full CI"
          {
            printf 'run_build=true\n'
            printf 'run_lint=true\n'
            printf 'run=true\n'
            printf 'changed=true\n'
          } >> "${GITHUB_OUTPUT}"

  # Each gate invokes the shared planner separately at its DAG boundary. These
  # two routes become eligible together after change detection, but each makes
  # its own /capacity request and can choose a different runner.
  route-build:
    name: Route Build
    needs: [changes]
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/_plan-runners.yml
    with:
      runner: ${{ inputs.runner }}
      local-pool-capacity-url: ${{ needs.changes.outputs.run_build == 'false' && '' || inputs.local-pool-capacity-url }}
      local-pool-label: ${{ inputs.local-pool-label }}
      for-gate: build
    secrets:
      LOCAL_POOL_CAPACITY_TOKEN: ${{ secrets.LOCAL_POOL_CAPACITY_TOKEN }}

  route-test:
    name: Route Test
    needs: [changes]
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/_plan-runners.yml
    with:
      runner: ${{ inputs.runner }}
      local-pool-capacity-url: ${{ needs.changes.outputs.run_build == 'false' && '' || inputs.local-pool-capacity-url }}
      local-pool-label: ${{ inputs.local-pool-label }}
      for-gate: test
    secrets:
      LOCAL_POOL_CAPACITY_TOKEN: ${{ secrets.LOCAL_POOL_CAPACITY_TOKEN }}

  # ── Build ──────────────────────────────────────────────────────────────────
  # build-pool: first attempt on the planned runner (pool or hosted).
  # build-hosted: hosted-only fallback that runs when build-pool fails or is
  # cancelled (a pool runner that disconnects mid-job ends as cancelled).
  # build: tiny aggregator that is the single required status check for Build.
  build-pool:
    name: Build (${{ needs.changes.outputs.run_build == 'false' && 'skipped' || (needs.route-build.outputs.on_pool == 'true' && 'self-hosted' || 'github-hosted') }})
    needs: [route-build, changes]
    # !cancelled() forces this to run when changes fails (empty run means full CI);
    # requiring route-build success keeps runs-on well-defined, so a routing
    # failure surfaces as a Build failure rather than an empty runner label.
    if: ${{ !cancelled() && needs.route-build.result == 'success' }}
    uses: ./.github/workflows/_ci-gate.yml
    with:
      gate: build
      # Route to ubuntu on an index-confirmed skip so a docs-only push does not
      # occupy a macOS pool slot.
      runner: ${{ needs.changes.outputs.run_build == 'false' && 'ubuntu-latest' || needs.route-build.outputs.label }}
      run: ${{ needs.changes.outputs.run_build }}
      xcode-version: ${{ inputs.xcode-version }}
      cache-profile: ${{ inputs.cache-profile }}
      cache-version: ${{ inputs.cache-version }}
      extra-cache-paths: ${{ inputs.extra-cache-paths }}
      brew-packages: ${{ inputs.brew-packages }}
      import-signing-cert: ${{ inputs.import-signing-cert }}
      install-provisioning-profile: ${{ inputs.install-provisioning-profile }}
      signing-identity-name: ${{ inputs.signing-identity-name }}
      apple-team-id: ${{ inputs.apple-team-id }}
      setup-target: ${{ inputs.setup-target }}
      make-args: ${{ inputs.make-args }}
      timeout-minutes: ${{ inputs.timeout-minutes }}
      fetch-depth: ${{ inputs.fetch-depth }}
    secrets: inherit

  build-hosted:
    name: Build (github-hosted retry)
    needs: [route-build, build-pool]
    # !cancelled() defeats GitHub's implicit skip so the fallback runs whenever the
    # pool attempt did not succeed and the run is still alive; on_pool gates it to
    # pool-routed runs. `!= 'success'` covers failed and skipped pool attempts. When
    # the whole run is cancelled by a newer push or the pool watchdog, this job and
    # the aggregators skip so the run cancels cleanly and ci-infra-retry.yml reruns.
    if: ${{ !cancelled() && needs.route-build.outputs.on_pool == 'true' && needs.build-pool.result != 'success' }}
    uses: ./.github/workflows/_ci-gate.yml
    with:
      gate: build
      runner: ${{ inputs.runner }}
      xcode-version: ${{ inputs.xcode-version }}
      cache-profile: ${{ inputs.cache-profile }}
      cache-version: ${{ inputs.cache-version }}
      extra-cache-paths: ${{ inputs.extra-cache-paths }}
      brew-packages: ${{ inputs.brew-packages }}
      import-signing-cert: ${{ inputs.import-signing-cert }}
      install-provisioning-profile: ${{ inputs.install-provisioning-profile }}
      signing-identity-name: ${{ inputs.signing-identity-name }}
      apple-team-id: ${{ inputs.apple-team-id }}
      setup-target: ${{ inputs.setup-target }}
      make-args: ${{ inputs.make-args }}
      timeout-minutes: ${{ inputs.timeout-minutes }}
      fetch-depth: ${{ inputs.fetch-depth }}
    secrets: inherit

  build:
    name: Build
    # !cancelled(), not always(): report the required check on every live run but
    # skip when the run is cancelled, so a superseded or watchdog-cancelled run
    # cancels cleanly and ci-infra-retry.yml can rerun it on hosted.
    if: ${{ !cancelled() }}
    needs: [build-pool, build-hosted]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Check build result
        env:
          POOL_RESULT: ${{ needs.build-pool.result }}
          HOSTED_RESULT: ${{ needs.build-hosted.result }}
        run: |
          if [[ "${POOL_RESULT}" == "success" ]] || [[ "${HOSTED_RESULT}" == "success" ]]; then
            printf 'Build passed (pool=%s, hosted=%s)\n' "${POOL_RESULT}" "${HOSTED_RESULT}"
          elif [[ "${POOL_RESULT}" == "skipped" ]] && [[ "${HOSTED_RESULT}" == "skipped" ]]; then
            printf 'Build skipped (pool=skipped, hosted=skipped); routing or an upstream step failed\n' >&2
            exit 1
          else
            printf 'Build failed (pool=%s, hosted=%s)\n' "${POOL_RESULT}" "${HOSTED_RESULT}" >&2
            exit 1
          fi

  # ── Test ───────────────────────────────────────────────────────────────────
  # test-pool: first attempt on the planned runner (pool or hosted).
  # test-hosted: hosted-only fallback that runs when test-pool fails or is
  # cancelled (a pool runner that disconnects mid-job ends as cancelled).
  # test: tiny aggregator that is the single required status check for Test.
  test-pool:
    name: Test (${{ needs.changes.outputs.run_build == 'false' && 'skipped' || (needs.route-test.outputs.on_pool == 'true' && 'self-hosted' || 'github-hosted') }})
    needs: [route-test, changes]
    # See build-pool: fail-safe on a changes failure, but require route-test
    # success so the runner label is always well-defined.
    if: ${{ !cancelled() && needs.route-test.result == 'success' }}
    uses: ./.github/workflows/_ci-gate.yml
    with:
      gate: test
      # Route to ubuntu on an index-confirmed skip so a docs-only push does not
      # occupy a macOS pool slot.
      runner: ${{ needs.changes.outputs.run_build == 'false' && 'ubuntu-latest' || needs.route-test.outputs.label }}
      run: ${{ needs.changes.outputs.run_build }}
      xcode-version: ${{ inputs.xcode-version }}
      cache-profile: ${{ inputs.cache-profile }}
      cache-version: ${{ inputs.cache-version }}
      extra-cache-paths: ${{ inputs.extra-cache-paths }}
      brew-packages: ${{ inputs.brew-packages }}
      import-signing-cert: ${{ inputs.import-signing-cert }}
      install-provisioning-profile: ${{ inputs.install-provisioning-profile }}
      signing-identity-name: ${{ inputs.signing-identity-name }}
      apple-team-id: ${{ inputs.apple-team-id }}
      setup-target: ${{ inputs.setup-target }}
      make-args: ${{ inputs.make-args }}
      timeout-minutes: ${{ inputs.timeout-minutes }}
      fetch-depth: ${{ inputs.fetch-depth }}
    secrets: inherit

  test-hosted:
    name: Test (github-hosted retry)
    needs: [route-test, test-pool]
    # See the build-hosted note: !cancelled() + on_pool + a failed pool attempt.
    if: ${{ !cancelled() && needs.route-test.outputs.on_pool == 'true' && needs.test-pool.result != 'success' }}
    uses: ./.github/workflows/_ci-gate.yml
    with:
      gate: test
      runner: ${{ inputs.runner }}
      xcode-version: ${{ inputs.xcode-version }}
      cache-profile: ${{ inputs.cache-profile }}
      cache-version: ${{ inputs.cache-version }}
      extra-cache-paths: ${{ inputs.extra-cache-paths }}
      brew-packages: ${{ inputs.brew-packages }}
      import-signing-cert: ${{ inputs.import-signing-cert }}
      install-provisioning-profile: ${{ inputs.install-provisioning-profile }}
      signing-identity-name: ${{ inputs.signing-identity-name }}
      apple-team-id: ${{ inputs.apple-team-id }}
      setup-target: ${{ inputs.setup-target }}
      make-args: ${{ inputs.make-args }}
      timeout-minutes: ${{ inputs.timeout-minutes }}
      fetch-depth: ${{ inputs.fetch-depth }}
    secrets: inherit

  test:
    name: Test
    # !cancelled(): see the Build aggregator note.
    if: ${{ !cancelled() }}
    needs: [test-pool, test-hosted]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Check test result
        env:
          POOL_RESULT: ${{ needs.test-pool.result }}
          HOSTED_RESULT: ${{ needs.test-hosted.result }}
        run: |
          if [[ "${POOL_RESULT}" == "success" ]] || [[ "${HOSTED_RESULT}" == "success" ]]; then
            printf 'Test passed (pool=%s, hosted=%s)\n' "${POOL_RESULT}" "${HOSTED_RESULT}"
          elif [[ "${POOL_RESULT}" == "skipped" ]] && [[ "${HOSTED_RESULT}" == "skipped" ]]; then
            printf 'Test skipped (pool=skipped, hosted=skipped); routing or an upstream step failed\n' >&2
            exit 1
          else
            printf 'Test failed (pool=%s, hosted=%s)\n' "${POOL_RESULT}" "${HOSTED_RESULT}" >&2
            exit 1
          fi

  # ── Quality ────────────────────────────────────────────────────────────────
  # Quality combines the five non-compiling checks in one reusable gate job.
  route-quality:
    name: Route Quality
    needs: [changes, build]
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/_plan-runners.yml
    with:
      runner: ${{ inputs.runner }}
      local-pool-capacity-url: ${{ needs.changes.outputs.run_lint == 'false' && '' || inputs.local-pool-capacity-url }}
      local-pool-label: ${{ inputs.local-pool-label }}
      for-gate: quality
    secrets:
      LOCAL_POOL_CAPACITY_TOKEN: ${{ secrets.LOCAL_POOL_CAPACITY_TOKEN }}

  quality-pool:
    name: Quality (${{ needs.changes.outputs.run_lint == 'false' && 'skipped' || (needs.route-quality.outputs.on_pool == 'true' && 'self-hosted' || 'github-hosted') }})
    needs: [route-quality, changes, build]
    if: ${{ !cancelled() && needs.route-quality.result == 'success' }}
    uses: ./.github/workflows/_ci-gate.yml
    with:
      gate: quality
      runner: ${{ needs.changes.outputs.run_lint == 'false' && 'ubuntu-latest' || needs.route-quality.outputs.label }}
      run: ${{ needs.changes.outputs.run_lint }}
      xcode-version: ${{ inputs.xcode-version }}
      cache-profile: ${{ inputs.cache-profile }}
      cache-version: ${{ inputs.cache-version }}
      extra-cache-paths: ${{ inputs.extra-cache-paths }}
      brew-packages: ${{ inputs.brew-packages }}
      setup-target: ${{ inputs.setup-target }}
      make-args: ${{ inputs.make-args }}
      apple-team-id: ${{ inputs.apple-team-id }}
      timeout-minutes: ${{ inputs.timeout-minutes }}
      fetch-depth: ${{ inputs.fetch-depth }}
    secrets: inherit

  quality-hosted:
    name: Quality (github-hosted retry)
    needs: [route-quality, quality-pool]
    # See the build-hosted note: !cancelled() + on_pool + a failed pool attempt.
    if: ${{ !cancelled() && needs.route-quality.outputs.on_pool == 'true' && needs.quality-pool.result != 'success' }}
    uses: ./.github/workflows/_ci-gate.yml
    with:
      gate: quality
      runner: ${{ inputs.runner }}
      xcode-version: ${{ inputs.xcode-version }}
      cache-profile: ${{ inputs.cache-profile }}
      cache-version: ${{ inputs.cache-version }}
      extra-cache-paths: ${{ inputs.extra-cache-paths }}
      brew-packages: ${{ inputs.brew-packages }}
      setup-target: ${{ inputs.setup-target }}
      make-args: ${{ inputs.make-args }}
      apple-team-id: ${{ inputs.apple-team-id }}
      timeout-minutes: ${{ inputs.timeout-minutes }}
      fetch-depth: ${{ inputs.fetch-depth }}
    secrets: inherit

  quality:
    name: Quality
    # !cancelled(): see the Build aggregator note.
    if: ${{ !cancelled() }}
    needs: [quality-pool, quality-hosted]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Check quality result
        env:
          POOL_RESULT: ${{ needs.quality-pool.result }}
          HOSTED_RESULT: ${{ needs.quality-hosted.result }}
        run: |
          if [[ "${POOL_RESULT}" == "success" ]] || [[ "${HOSTED_RESULT}" == "success" ]]; then
            printf 'Quality passed (pool=%s, hosted=%s)\n' "${POOL_RESULT}" "${HOSTED_RESULT}"
          elif [[ "${POOL_RESULT}" == "skipped" ]] && [[ "${HOSTED_RESULT}" == "skipped" ]]; then
            printf 'Quality skipped (pool=skipped, hosted=skipped); routing or an upstream step failed\n' >&2
            exit 1
          else
            printf 'Quality failed (pool=%s, hosted=%s)\n' "${POOL_RESULT}" "${HOSTED_RESULT}" >&2
            exit 1
          fi

  # ── Extra Targets ──────────────────────────────────────────────────────────
  # extra-targets-pool: first attempt on the planned runner (pool or hosted).
  # extra-targets-hosted: hosted-only fallback that runs when the pool attempt
  # fails or is cancelled (a pool runner that disconnects ends as cancelled).
  # extra-targets: tiny aggregator that is the single required status check.
  # Both attempts skip when there are no bespoke targets to run.
  route-extra-targets:
    name: Route Extra Targets
    needs: [changes, build, test, quality]
    # !cancelled() defeats the implicit skip once the required gates finish, while
    # skipping on a cancelled run; the explicit result checks keep it gated on
    # every upstream gate succeeding.
    if: ${{ !cancelled() && needs.build.result == 'success' && needs.test.result == 'success' && needs.quality.result == 'success' && (inputs.extra-targets != '[]' || inputs.targets != '["lint","build","test","audit"]') }}
    uses: ./.github/workflows/_plan-runners.yml
    with:
      runner: ${{ inputs.runner }}
      local-pool-capacity-url: ${{ needs.changes.outputs.run == 'false' && '' || inputs.local-pool-capacity-url }}
      local-pool-label: ${{ inputs.local-pool-label }}
      for-gate: extra-targets
    secrets:
      LOCAL_POOL_CAPACITY_TOKEN: ${{ secrets.LOCAL_POOL_CAPACITY_TOKEN }}

  extra-targets-pool:
    name: Extra Targets (${{ needs.changes.outputs.run == 'false' && 'skipped' || (needs.route-extra-targets.outputs.on_pool == 'true' && 'self-hosted' || 'github-hosted') }})
    needs: [route-extra-targets, changes, build, test, quality]
    if: ${{ !cancelled() && needs.route-extra-targets.result == 'success' }}
    uses: ./.github/workflows/_ci-gate.yml
    with:
      gate: extra-targets
      # Route to ubuntu on an index-confirmed skip so a docs-only push does not
      # occupy a macOS pool slot.
      runner: ${{ needs.changes.outputs.run == 'false' && 'ubuntu-latest' || needs.route-extra-targets.outputs.label }}
      run: ${{ needs.changes.outputs.run }}
      extra-targets: ${{ inputs.extra-targets }}
      targets: ${{ inputs.targets }}
      xcode-version: ${{ inputs.xcode-version }}
      cache-profile: ${{ inputs.cache-profile }}
      cache-version: ${{ inputs.cache-version }}
      extra-cache-paths: ${{ inputs.extra-cache-paths }}
      brew-packages: ${{ inputs.brew-packages }}
      import-signing-cert: ${{ inputs.import-signing-cert }}
      install-provisioning-profile: ${{ inputs.install-provisioning-profile }}
      signing-identity-name: ${{ inputs.signing-identity-name }}
      apple-team-id: ${{ inputs.apple-team-id }}
      setup-target: ${{ inputs.setup-target }}
      make-args: ${{ inputs.make-args }}
      timeout-minutes: ${{ inputs.timeout-minutes }}
      fetch-depth: ${{ inputs.fetch-depth }}
    secrets: inherit

  extra-targets-hosted:
    name: Extra Targets (github-hosted retry)
    needs: [route-extra-targets, extra-targets-pool]
    # See the build-hosted note: !cancelled(). Runs only when the caller configured
    # extra targets, expressed inline since the reusable planner carries no such
    # output.
    if: ${{ !cancelled() && (inputs.extra-targets != '[]' || inputs.targets != '["lint","build","test","audit"]') && needs.route-extra-targets.outputs.on_pool == 'true' && needs.extra-targets-pool.result != 'success' }}
    uses: ./.github/workflows/_ci-gate.yml
    with:
      gate: extra-targets
      runner: ${{ inputs.runner }}
      extra-targets: ${{ inputs.extra-targets }}
      targets: ${{ inputs.targets }}
      xcode-version: ${{ inputs.xcode-version }}
      cache-profile: ${{ inputs.cache-profile }}
      cache-version: ${{ inputs.cache-version }}
      extra-cache-paths: ${{ inputs.extra-cache-paths }}
      brew-packages: ${{ inputs.brew-packages }}
      import-signing-cert: ${{ inputs.import-signing-cert }}
      install-provisioning-profile: ${{ inputs.install-provisioning-profile }}
      signing-identity-name: ${{ inputs.signing-identity-name }}
      apple-team-id: ${{ inputs.apple-team-id }}
      setup-target: ${{ inputs.setup-target }}
      make-args: ${{ inputs.make-args }}
      timeout-minutes: ${{ inputs.timeout-minutes }}
      fetch-depth: ${{ inputs.fetch-depth }}
    secrets: inherit

  extra-targets:
    name: Extra Targets
    # !cancelled(): see the Build aggregator note.
    if: ${{ !cancelled() }}
    needs: [extra-targets-pool, extra-targets-hosted]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Check extra-targets result
        env:
          POOL_RESULT: ${{ needs.extra-targets-pool.result }}
          HOSTED_RESULT: ${{ needs.extra-targets-hosted.result }}
          # True when bespoke targets are configured, so both attempts skipping
          # means an upstream gate failed rather than a legitimate no-op.
          HAS_EXTRA: ${{ inputs.extra-targets != '[]' || inputs.targets != '["lint","build","test","audit"]' }}
        run: |
          if [[ "${POOL_RESULT}" == "success" ]] || [[ "${HOSTED_RESULT}" == "success" ]]; then
            printf 'Extra targets passed (pool=%s, hosted=%s)\n' "${POOL_RESULT}" "${HOSTED_RESULT}"
          elif [[ "${POOL_RESULT}" == "skipped" ]] && [[ "${HOSTED_RESULT}" == "skipped" ]]; then
            if [[ "${HAS_EXTRA}" == "true" ]]; then
              printf 'Extra targets were configured but both attempts skipped; an upstream gate failed\n' >&2
              exit 1
            fi
            printf 'Extra targets skipped (no bespoke targets configured)\n'
          else
            printf 'Extra targets failed (pool=%s, hosted=%s)\n' "${POOL_RESULT}" "${HOSTED_RESULT}" >&2
            exit 1
          fi

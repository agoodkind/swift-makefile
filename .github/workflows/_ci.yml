# Reusable Swift CI. Consumers call this with their make targets; all logic
# stays in make. Triggers live in the caller (GitHub does not allow them here).
name: CI

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: macos-latest
      xcode-version:
        type: string
        default: latest-stable
      # JSON array of make targets; one matrix job per target.
      targets:
        type: string
        default: '["lint","build","test","audit"]'
      # Optional make target run before each matrix target (e.g. install-dependencies).
      setup-target:
        type: string
        default: ""
      # Appended verbatim to every make invocation (e.g. CODE_SIGN_IDENTITY=-).
      make-args:
        type: string
        default: ""
      brew-packages:
        type: string
        default: ""
      # Import a real Developer ID certificate before building (requires the
      # APPLE_DEVELOPER_ID_P12_* secrets; silently skipped when absent).
      import-signing-cert:
        type: boolean
        default: false
      # Install a Developer ID provisioning profile before building, for apps with
      # entitlements that require one (iCloud). Requires the
      # APPLE_DEVELOPER_ID_PROFILE_BASE64 secret; silently skipped when absent.
      install-provisioning-profile:
        type: boolean
        default: false
      signing-identity-name:
        type: string
        default: ""
      apple-team-id:
        type: string
        default: ""
      extra-cache-paths:
        type: string
        default: ""
      fetch-depth:
        type: string
        default: "1"
      timeout-minutes:
        type: number
        default: 30
    secrets:
      APPLE_DEVELOPER_ID_P12_BASE64:
        required: false
      APPLE_DEVELOPER_ID_P12_PASSWORD:
        required: false
      APPLE_DEVELOPER_ID_PROFILE_BASE64:
        required: false
      # App Store Connect API key for iOS automatic signing
      # (`xcodebuild -allowProvisioningUpdates`). The consumer's build reads these
      # from the environment, the same names `_release.yml` uses for notarization.
      # Absent, the build does no automatic signing, which a simulator build never needs.
      APPLE_NOTARY_KEY_BASE64:
        required: false
      APPLE_NOTARY_KEY_ID:
        required: false
      APPLE_NOTARY_ISSUER_ID:
        required: false

env:
  # The swift-makefile bootstrap fetches swift.mk via `gh api`; unauthenticated
  # fetches fail silently, so every consumer needs this token.
  GH_TOKEN: ${{ github.token }}

jobs:
  # The decoupled, always-run lint/audit/deadcode gate. swift-mk owns it, so it
  # runs on every consumer PR regardless of `targets` and cannot be dropped. It
  # runs `build-check` (the exact set the inline `build` gate ran before), so the
  # `build` matrix job below skips its inline gates on CI and never double-gates.
  # The deadcode coverage build disables signing itself, so this job imports no
  # cert; DEVELOPMENT_TEAM still flows for project generation when set.
  gate:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch-depth }}

      - name: Install brew packages
        if: inputs.brew-packages != ''
        run: brew install ${{ inputs.brew-packages }}

      - uses: agoodkind/swift-makefile/.github/actions/setup-build-env@main
        with:
          xcode-version: ${{ inputs.xcode-version }}
          github-token: ${{ github.token }}
          extra-cache-paths: ${{ inputs.extra-cache-paths }}

      - name: Run setup target
        if: inputs.setup-target != ''
        env:
          TEAM_ID: ${{ inputs.apple-team-id }}
        run: |
          sign_args=""
          if [ -n "${TEAM_ID:-}" ]; then sign_args="DEVELOPMENT_TEAM=$TEAM_ID"; fi
          make ${{ inputs.setup-target }} ${{ inputs.make-args }} $sign_args

      - name: Run build-check gate
        env:
          TEAM_ID: ${{ inputs.apple-team-id }}
        run: |
          sign_args=""
          if [ -n "${TEAM_ID:-}" ]; then sign_args="DEVELOPMENT_TEAM=$TEAM_ID"; fi
          make build-check ${{ inputs.make-args }} $sign_args

  ci:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(inputs.targets) }}
    env:
      HAS_SIGNING: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 != '' }}
      HAS_PROFILE: ${{ secrets.APPLE_DEVELOPER_ID_PROFILE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch-depth }}

      - name: Install brew packages
        if: inputs.brew-packages != ''
        run: brew install ${{ inputs.brew-packages }}

      - uses: agoodkind/swift-makefile/.github/actions/setup-build-env@main
        with:
          xcode-version: ${{ inputs.xcode-version }}
          github-token: ${{ github.token }}
          extra-cache-paths: ${{ inputs.extra-cache-paths }}

      - name: Install signing certificate
        id: cert
        if: ${{ inputs.import-signing-cert && env.HAS_SIGNING == 'true' }}
        uses: agoodkind/swift-makefile/.github/actions/import-signing-cert@main
        with:
          p12-base64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          identity-name: ${{ inputs.signing-identity-name }}

      - name: Install provisioning profile
        id: profile
        if: ${{ inputs.install-provisioning-profile && env.HAS_PROFILE == 'true' }}
        uses: agoodkind/swift-makefile/.github/actions/install-provisioning-profile@main
        with:
          profile-base64: ${{ secrets.APPLE_DEVELOPER_ID_PROFILE_BASE64 }}

      # Signing values pass as make command-line variables only when present, so
      # an absent cert never clobbers a consumer's ?= defaults with empty values.
      # PROVISIONING_PROFILE_SPECIFIER goes in the environment, not as a build
      # setting (swift-mk forbids that key), so the consumer's project resolves
      # `$(PROVISIONING_PROFILE_SPECIFIER)` from it; it is empty for profile-less
      # consumers and has no effect there.
      # The notary key flows in the environment under the names the consumer's
      # build reads for `-allowProvisioningUpdates` automatic signing. It is empty
      # for consumers that do not sign iOS and has no effect there.
      - name: Run setup target
        if: inputs.setup-target != ''
        env:
          CERT_SHA1: ${{ steps.cert.outputs.identity-sha1 }}
          TEAM_ID: ${{ inputs.apple-team-id }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ steps.profile.outputs.profile-specifier }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          sign_args=""
          if [ -n "${CERT_SHA1:-}" ]; then sign_args="CODE_SIGN_IDENTITY=$CERT_SHA1"; fi
          if [ -n "${TEAM_ID:-}" ]; then sign_args="$sign_args DEVELOPMENT_TEAM=$TEAM_ID"; fi
          make ${{ inputs.setup-target }} ${{ inputs.make-args }} $sign_args

      - name: Run ${{ matrix.target }}
        env:
          CERT_SHA1: ${{ steps.cert.outputs.identity-sha1 }}
          TEAM_ID: ${{ inputs.apple-team-id }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ steps.profile.outputs.profile-specifier }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          sign_args=""
          if [ -n "${CERT_SHA1:-}" ]; then sign_args="CODE_SIGN_IDENTITY=$CERT_SHA1"; fi
          if [ -n "${TEAM_ID:-}" ]; then sign_args="$sign_args DEVELOPMENT_TEAM=$TEAM_ID"; fi
          make ${{ matrix.target }} ${{ inputs.make-args }} $sign_args

name: CI

on:
  workflow_call:

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - run: brew install swiftlint periphery osv-scanner
      - run: make lint

  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - run: make build

  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - run: make test

  audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - run: brew install osv-scanner
      - run: make audit

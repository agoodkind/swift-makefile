# Reusable Swift CI. Consumers declare setup plus optional bespoke extra
# targets; the required Build, Test, and Quality gates live here. Triggers live
# in the caller (GitHub does not allow them here).
name: CI

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: macos-latest
      xcode-version:
        type: string
        default: latest-stable
      # Legacy JSON array alias for bespoke extra targets. Required Build, Test,
      # and Quality jobs now run unconditionally here.
      targets:
        type: string
        default: '["lint","build","test","audit"]'
      # Optional JSON array of bespoke make targets that run after the shared
      # required jobs.
      extra-targets:
        type: string
        default: '[]'
      # Optional make target run before each required job and once before the
      # extra-target batch.
      setup-target:
        type: string
        default: ""
      # Appended verbatim to every make invocation (e.g. CODE_SIGN_IDENTITY=-).
      make-args:
        type: string
        default: ""
      brew-packages:
        type: string
        default: ""
      cache-profile:
        type: string
        default: safe
      cache-version:
        type: string
        default: v1
      # Import a real Developer ID certificate before building. Requires the
      # APPLE_DEVELOPER_ID_P12_* secrets when enabled.
      import-signing-cert:
        type: boolean
        default: false
      # Install a Developer ID provisioning profile before building, for apps
      # with entitlements that require one (iCloud). Requires the
      # APPLE_DEVELOPER_ID_PROFILE_BASE64 secret when enabled.
      install-provisioning-profile:
        type: boolean
        default: false
      signing-identity-name:
        type: string
        default: ""
      apple-team-id:
        type: string
        default: ""
      extra-cache-paths:
        type: string
        default: ""
      fetch-depth:
        type: string
        default: "1"
      timeout-minutes:
        type: number
        # 60 leaves headroom for a one-time cold compile-cache populate. The SwiftPM
        # compile cache uses -explicit-module-build, whose cold build is slower than an
        # uncached build; the populate run must finish once to save the rolling cache so
        # later runs replay and drop well under this ceiling. This is a ceiling, not a
        # target, so a normal build still finishes early.
        default: 60
      # Self-hosted macOS pool support. When local-pool-capacity-url is set and
      # the pool reports available capacity, Build, Test, and Extra Targets run
      # on local-pool-label; otherwise they fall back to inputs.runner. Quality
      # always runs on inputs.runner. An empty URL routes everything to hosted
      # through the same plan-runners path; there is no separate no-op branch.
      local-pool-capacity-url:
        type: string
        default: ""
      # Runner label for the self-hosted pool. Ignored when the pool is
      # unavailable or local-pool-capacity-url is empty.
      local-pool-label:
        type: string
        default: agk-local-macos-26
    secrets:
      APPLE_DEVELOPER_ID_P12_BASE64:
        required: false
      APPLE_DEVELOPER_ID_P12_PASSWORD:
        required: false
      APPLE_DEVELOPER_ID_PROFILE_BASE64:
        required: false
      # App Store Connect API key for iOS automatic signing
      # (`xcodebuild -allowProvisioningUpdates`). The consumer's build reads
      # these from the environment, the same names `_release.yml` uses for
      # notarization. Absent, the build does no automatic signing, which a
      # simulator build never needs.
      APPLE_NOTARY_KEY_BASE64:
        required: false
      APPLE_NOTARY_KEY_ID:
        required: false
      APPLE_NOTARY_ISSUER_ID:
        required: false
      # Bearer token for the self-hosted pool's guarded /capacity endpoint. When
      # set (alongside local-pool-capacity-url) plan-runners authenticates the
      # capacity check; absent or wrong, the broker returns 401 and the gate
      # falls back to hosted, so CI is never blocked.
      LOCAL_POOL_CAPACITY_TOKEN:
        required: false

env:
  # The swift-makefile bootstrap fetches swift.mk via `gh api`; unauthenticated
  # fetches fail silently, so every consumer needs this token.
  GH_TOKEN: ${{ github.token }}
  # GitHub's macOS runners currently ship with untrusted third-party taps
  # preinstalled, which makes unrelated `brew install` and `brew update` calls
  # fail closed unless the job disables the new trust gate explicitly.
  HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"

jobs:
  quality:
    name: Quality / ${{ matrix.name }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    env:
      SWIFT_MK_HELPER_ROOT: ${{ github.repository == 'agoodkind/swift-makefile' && '.' || '.swift-makefile' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: SwiftLint
            target: lint-swiftlint
          - name: Format
            target: lint-format
          - name: Complexity
            target: lint-complexity
          - name: Deadcode
            target: lint-deadcode
          - name: Swiftcheck Extra
            target: swiftcheck-extra
          - name: Audit
            target: audit
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: ${{ inputs.fetch-depth }}

      - name: Checkout swift-makefile helpers
        if: github.repository != 'agoodkind/swift-makefile'
        uses: actions/checkout@v7
        with:
          repository: agoodkind/swift-makefile
          # The caller's github.sha names the consumer repo commit, not a
          # commit in swift-makefile, so the helper checkout follows the
          # same `@main` contract the reusable workflow already advertises.
          ref: main
          path: .swift-makefile
          fetch-depth: 1

      - name: Install brew packages
        if: inputs.brew-packages != ''
        env:
          BREW_PACKAGES: ${{ inputs.brew-packages }}
        run: bash "${SWIFT_MK_HELPER_ROOT}/.github/actions/install-brew-packages/install-brew-packages.sh"

      - name: Setup Swift build env
        if: github.repository == 'agoodkind/swift-makefile'
        uses: ./.github/actions/setup-build-env
        with:
          xcode-version: ${{ inputs.xcode-version }}
          github-token: ${{ github.token }}
          cache-profile: ${{ inputs.cache-profile }}
          cache-version: ${{ inputs.cache-version }}
          extra-cache-paths: ${{ inputs.extra-cache-paths }}
          gate: ${{ matrix.target }}

      - name: Setup Swift build env
        if: github.repository != 'agoodkind/swift-makefile'
        uses: agoodkind/swift-makefile/.github/actions/setup-build-env@main
        with:
          xcode-version: ${{ inputs.xcode-version }}
          github-token: ${{ github.token }}
          cache-profile: ${{ inputs.cache-profile }}
          cache-version: ${{ inputs.cache-version }}
          extra-cache-paths: ${{ inputs.extra-cache-paths }}
          gate: ${{ matrix.target }}

      - name: Run setup target
        if: inputs.setup-target != ''
        env:
          MAKE_TARGET: ${{ inputs.setup-target }}
          MAKE_ARGS: ${{ inputs.make-args }}
          TEAM_ID: ${{ inputs.apple-team-id }}
        run: swift "${SWIFT_MK_HELPER_ROOT}/.github/actions/workflow-helper/workflow-helper.swift" run-make-with-team

      - name: Run shared quality guard
        env:
          MAKE_TARGET: quality-guard
          MAKE_ARGS: ${{ inputs.make-args }}
          TEAM_ID: ${{ inputs.apple-team-id }}
        run: swift "${SWIFT_MK_HELPER_ROOT}/.github/actions/workflow-helper/workflow-helper.swift" run-make-with-team

      - name: Run ${{ matrix.name }}
        env:
          MAKE_TARGET: ${{ matrix.target }}
          MAKE_ARGS: ${{ inputs.make-args }}
          TEAM_ID: ${{ inputs.apple-team-id }}
        run: swift "${SWIFT_MK_HELPER_ROOT}/.github/actions/workflow-helper/workflow-helper.swift" run-make-with-team

  # ── Runner planning ────────────────────────────────────────────────────────
  # Runs on ubuntu-latest (fast, cheap) and decides which runner label each
  # heavy gate should use. Fork PRs short-circuit to hosted before any network
  # call. When local-pool-capacity-url is empty or the capacity endpoint says
  # the pool is busy, all gates fall back to inputs.runner automatically; there
  # is no separate no-op branch for the empty-URL case.
  plan-runners:
    name: Plan runners
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      build_label: ${{ steps.pick.outputs.build_label }}
      test_label: ${{ steps.pick.outputs.test_label }}
      extra_targets_label: ${{ steps.pick.outputs.extra_targets_label }}
      # on_pool: the gates were routed to the self-hosted pool, so a hosted
      # fallback is meaningful. extra_targets_enabled: the run configured any
      # extra targets. Both name the intent the gnarly fallback if: needs, so it
      # reads as "always, was on the pool, the pool did not pass".
      on_pool: ${{ steps.pick.outputs.on_pool }}
      extra_targets_enabled: ${{ inputs.extra-targets != '[]' || inputs.targets != '["lint","build","test","audit"]' }}
    steps:
      - name: Pick runner labels
        id: pick
        env:
          CAPACITY_URL: ${{ inputs.local-pool-capacity-url }}
          CAPACITY_TOKEN: ${{ secrets.LOCAL_POOL_CAPACITY_TOKEN }}
          POOL_LABEL: ${{ inputs.local-pool-label }}
          HOSTED_LABEL: ${{ inputs.runner }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          # Evaluates to "true" for fork PRs; everything else is trusted.
          IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          set -euo pipefail

          if [[ "${IS_FORK_PR}" == "true" ]]; then
            # Untrusted event: never curl the internal capacity endpoint.
            label="${HOSTED_LABEL}"
          elif [[ -z "${CAPACITY_URL}" ]]; then
            # No pool configured: route directly to hosted.
            label="${HOSTED_LABEL}"
          else
            # Curl the capacity endpoint; any error (timeout, non-200, malformed
            # body) falls through to hosted so the pool never blocks a gate.
            # Pick the query separator so a capacity URL that already carries a
            # query string stays valid instead of producing a double '?'.
            sep='?'
            case "${CAPACITY_URL}" in *\?*) sep='&' ;; esac
            response=$(curl -sf --max-time 5 \
              -H "Authorization: Bearer ${CAPACITY_TOKEN}" \
              "${CAPACITY_URL}${sep}repo=${REPO}&run_id=${RUN_ID}" 2>/dev/null || printf '')
            available=$(printf '%s' "${response}" | jq -r '.available // false' 2>/dev/null || printf 'false')
            if [[ "${available}" == "true" ]]; then
              label="${POOL_LABEL}"
            else
              label="${HOSTED_LABEL}"
            fi
          fi

          # on_pool is true only when a pool label was actually chosen, so the
          # hosted fallback never re-runs a gate that already ran on hosted.
          if [[ "${label}" != "${HOSTED_LABEL}" ]]; then
            on_pool=true
          else
            on_pool=false
          fi

          {
            printf 'build_label=%s\n' "${label}"
            printf 'test_label=%s\n' "${label}"
            printf 'extra_targets_label=%s\n' "${label}"
            printf 'on_pool=%s\n' "${on_pool}"
          } >> "${GITHUB_OUTPUT}"

  # ── Build ──────────────────────────────────────────────────────────────────
  # build-pool: first attempt on the planned runner (pool or hosted).
  # build-hosted: hosted-only fallback that runs when build-pool fails or is
  # cancelled (a pool runner that disconnects mid-job ends as cancelled).
  # build: tiny aggregator that is the single required status check for Build.
  build-pool:
    name: Build (pool attempt)
    needs: plan-runners
    uses: ./.github/workflows/_ci-gate.yml
    with:
      gate: build
      runner: ${{ needs.plan-runners.outputs.build_label }}
      xcode-version: ${{ inputs.xcode-version }}
      cache-profile: ${{ inputs.cache-profile }}
      cache-version: ${{ inputs.cache-version }}
      extra-cache-paths: ${{ inputs.extra-cache-paths }}
      brew-packages: ${{ inputs.brew-packages }}
      import-signing-cert: ${{ inputs.import-signing-cert }}
      install-provisioning-profile: ${{ inputs.install-provisioning-profile }}
      signing-identity-name: ${{ inputs.signing-identity-name }}
      apple-team-id: ${{ inputs.apple-team-id }}
      setup-target: ${{ inputs.setup-target }}
      make-args: ${{ inputs.make-args }}
      timeout-minutes: ${{ inputs.timeout-minutes }}
      fetch-depth: ${{ inputs.fetch-depth }}
    secrets: inherit

  build-hosted:
    name: Build (hosted fallback)
    needs: [plan-runners, build-pool]
    # always() defeats GitHub's implicit skip so the fallback runs when the pool
    # attempt fails; on_pool gates it to pool-routed runs.
    if: ${{ always() && needs.plan-runners.outputs.on_pool == 'true' && (needs.build-pool.result == 'failure' || needs.build-pool.result == 'cancelled') }}
    uses: ./.github/workflows/_ci-gate.yml
    with:
      gate: build
      runner: ${{ inputs.runner }}
      xcode-version: ${{ inputs.xcode-version }}
      cache-profile: ${{ inputs.cache-profile }}
      cache-version: ${{ inputs.cache-version }}
      extra-cache-paths: ${{ inputs.extra-cache-paths }}
      brew-packages: ${{ inputs.brew-packages }}
      import-signing-cert: ${{ inputs.import-signing-cert }}
      install-provisioning-profile: ${{ inputs.install-provisioning-profile }}
      signing-identity-name: ${{ inputs.signing-identity-name }}
      apple-team-id: ${{ inputs.apple-team-id }}
      setup-target: ${{ inputs.setup-target }}
      make-args: ${{ inputs.make-args }}
      timeout-minutes: ${{ inputs.timeout-minutes }}
      fetch-depth: ${{ inputs.fetch-depth }}
    secrets: inherit

  build:
    name: Build
    if: ${{ always() }}
    needs: [build-pool, build-hosted]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Check build result
        env:
          POOL_RESULT: ${{ needs.build-pool.result }}
          HOSTED_RESULT: ${{ needs.build-hosted.result }}
        run: |
          if [[ "${POOL_RESULT}" == "success" ]] || [[ "${HOSTED_RESULT}" == "success" ]]; then
            printf 'Build passed (pool=%s, hosted=%s)\n' "${POOL_RESULT}" "${HOSTED_RESULT}"
          elif [[ "${POOL_RESULT}" == "skipped" ]] && [[ "${HOSTED_RESULT}" == "skipped" ]]; then
            printf 'Build skipped (pool=skipped, hosted=skipped); plan-runners or an upstream step failed\n' >&2
            exit 1
          else
            printf 'Build failed (pool=%s, hosted=%s)\n' "${POOL_RESULT}" "${HOSTED_RESULT}" >&2
            exit 1
          fi

  # ── Test ───────────────────────────────────────────────────────────────────
  # test-pool: first attempt on the planned runner (pool or hosted).
  # test-hosted: hosted-only fallback that runs when test-pool fails or is
  # cancelled (a pool runner that disconnects mid-job ends as cancelled).
  # test: tiny aggregator that is the single required status check for Test.
  test-pool:
    name: Test (pool attempt)
    needs: plan-runners
    uses: ./.github/workflows/_ci-gate.yml
    with:
      gate: test
      runner: ${{ needs.plan-runners.outputs.test_label }}
      xcode-version: ${{ inputs.xcode-version }}
      cache-profile: ${{ inputs.cache-profile }}
      cache-version: ${{ inputs.cache-version }}
      extra-cache-paths: ${{ inputs.extra-cache-paths }}
      brew-packages: ${{ inputs.brew-packages }}
      import-signing-cert: ${{ inputs.import-signing-cert }}
      install-provisioning-profile: ${{ inputs.install-provisioning-profile }}
      signing-identity-name: ${{ inputs.signing-identity-name }}
      apple-team-id: ${{ inputs.apple-team-id }}
      setup-target: ${{ inputs.setup-target }}
      make-args: ${{ inputs.make-args }}
      timeout-minutes: ${{ inputs.timeout-minutes }}
      fetch-depth: ${{ inputs.fetch-depth }}
    secrets: inherit

  test-hosted:
    name: Test (hosted fallback)
    needs: [plan-runners, test-pool]
    # See the build-hosted note: always() + on_pool + a failed pool attempt.
    if: ${{ always() && needs.plan-runners.outputs.on_pool == 'true' && (needs.test-pool.result == 'failure' || needs.test-pool.result == 'cancelled') }}
    uses: ./.github/workflows/_ci-gate.yml
    with:
      gate: test
      runner: ${{ inputs.runner }}
      xcode-version: ${{ inputs.xcode-version }}
      cache-profile: ${{ inputs.cache-profile }}
      cache-version: ${{ inputs.cache-version }}
      extra-cache-paths: ${{ inputs.extra-cache-paths }}
      brew-packages: ${{ inputs.brew-packages }}
      import-signing-cert: ${{ inputs.import-signing-cert }}
      install-provisioning-profile: ${{ inputs.install-provisioning-profile }}
      signing-identity-name: ${{ inputs.signing-identity-name }}
      apple-team-id: ${{ inputs.apple-team-id }}
      setup-target: ${{ inputs.setup-target }}
      make-args: ${{ inputs.make-args }}
      timeout-minutes: ${{ inputs.timeout-minutes }}
      fetch-depth: ${{ inputs.fetch-depth }}
    secrets: inherit

  test:
    name: Test
    if: ${{ always() }}
    needs: [test-pool, test-hosted]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Check test result
        env:
          POOL_RESULT: ${{ needs.test-pool.result }}
          HOSTED_RESULT: ${{ needs.test-hosted.result }}
        run: |
          if [[ "${POOL_RESULT}" == "success" ]] || [[ "${HOSTED_RESULT}" == "success" ]]; then
            printf 'Test passed (pool=%s, hosted=%s)\n' "${POOL_RESULT}" "${HOSTED_RESULT}"
          elif [[ "${POOL_RESULT}" == "skipped" ]] && [[ "${HOSTED_RESULT}" == "skipped" ]]; then
            printf 'Test skipped (pool=skipped, hosted=skipped); plan-runners or an upstream step failed\n' >&2
            exit 1
          else
            printf 'Test failed (pool=%s, hosted=%s)\n' "${POOL_RESULT}" "${HOSTED_RESULT}" >&2
            exit 1
          fi

  # ── Extra Targets ──────────────────────────────────────────────────────────
  # extra-targets-pool: first attempt on the planned runner (pool or hosted).
  # extra-targets-hosted: hosted-only fallback that runs when the pool attempt
  # fails or is cancelled (a pool runner that disconnects ends as cancelled).
  # extra-targets: tiny aggregator that is the single required status check.
  # Both attempts skip when there are no bespoke targets to run.
  extra-targets-pool:
    name: Extra Targets (pool attempt)
    # always() defeats the implicit skip that fires when a needed job uses
    # if: always() (the build/test aggregates do); the explicit result checks
    # keep this gated on every upstream gate actually succeeding.
    if: ${{ always() && needs.plan-runners.result == 'success' && needs.quality.result == 'success' && needs.build.result == 'success' && needs.test.result == 'success' && needs.plan-runners.outputs.extra_targets_enabled == 'true' }}
    needs: [plan-runners, quality, build, test]
    uses: ./.github/workflows/_ci-gate.yml
    with:
      gate: extra-targets
      runner: ${{ needs.plan-runners.outputs.extra_targets_label }}
      extra-targets: ${{ inputs.extra-targets }}
      targets: ${{ inputs.targets }}
      xcode-version: ${{ inputs.xcode-version }}
      cache-profile: ${{ inputs.cache-profile }}
      cache-version: ${{ inputs.cache-version }}
      extra-cache-paths: ${{ inputs.extra-cache-paths }}
      brew-packages: ${{ inputs.brew-packages }}
      import-signing-cert: ${{ inputs.import-signing-cert }}
      install-provisioning-profile: ${{ inputs.install-provisioning-profile }}
      signing-identity-name: ${{ inputs.signing-identity-name }}
      apple-team-id: ${{ inputs.apple-team-id }}
      setup-target: ${{ inputs.setup-target }}
      make-args: ${{ inputs.make-args }}
      timeout-minutes: ${{ inputs.timeout-minutes }}
      fetch-depth: ${{ inputs.fetch-depth }}
    secrets: inherit

  extra-targets-hosted:
    name: Extra Targets (hosted fallback)
    needs: [plan-runners, extra-targets-pool]
    # See the build-hosted note, plus extra_targets_enabled so it only runs when
    # extra targets were configured.
    if: ${{ always() && needs.plan-runners.outputs.extra_targets_enabled == 'true' && needs.plan-runners.outputs.on_pool == 'true' && (needs.extra-targets-pool.result == 'failure' || needs.extra-targets-pool.result == 'cancelled') }}
    uses: ./.github/workflows/_ci-gate.yml
    with:
      gate: extra-targets
      runner: ${{ inputs.runner }}
      extra-targets: ${{ inputs.extra-targets }}
      targets: ${{ inputs.targets }}
      xcode-version: ${{ inputs.xcode-version }}
      cache-profile: ${{ inputs.cache-profile }}
      cache-version: ${{ inputs.cache-version }}
      extra-cache-paths: ${{ inputs.extra-cache-paths }}
      brew-packages: ${{ inputs.brew-packages }}
      import-signing-cert: ${{ inputs.import-signing-cert }}
      install-provisioning-profile: ${{ inputs.install-provisioning-profile }}
      signing-identity-name: ${{ inputs.signing-identity-name }}
      apple-team-id: ${{ inputs.apple-team-id }}
      setup-target: ${{ inputs.setup-target }}
      make-args: ${{ inputs.make-args }}
      timeout-minutes: ${{ inputs.timeout-minutes }}
      fetch-depth: ${{ inputs.fetch-depth }}
    secrets: inherit

  extra-targets:
    name: Extra Targets
    if: ${{ always() }}
    needs: [extra-targets-pool, extra-targets-hosted]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Check extra-targets result
        env:
          POOL_RESULT: ${{ needs.extra-targets-pool.result }}
          HOSTED_RESULT: ${{ needs.extra-targets-hosted.result }}
          # True when bespoke targets are configured, so both attempts skipping
          # means an upstream gate failed rather than a legitimate no-op.
          HAS_EXTRA: ${{ inputs.extra-targets != '[]' || inputs.targets != '["lint","build","test","audit"]' }}
        run: |
          if [[ "${POOL_RESULT}" == "success" ]] || [[ "${HOSTED_RESULT}" == "success" ]]; then
            printf 'Extra targets passed (pool=%s, hosted=%s)\n' "${POOL_RESULT}" "${HOSTED_RESULT}"
          elif [[ "${POOL_RESULT}" == "skipped" ]] && [[ "${HOSTED_RESULT}" == "skipped" ]]; then
            if [[ "${HAS_EXTRA}" == "true" ]]; then
              printf 'Extra targets were configured but both attempts skipped; an upstream gate failed\n' >&2
              exit 1
            fi
            printf 'Extra targets skipped (no bespoke targets configured)\n'
          else
            printf 'Extra targets failed (pool=%s, hosted=%s)\n' "${POOL_RESULT}" "${HOSTED_RESULT}" >&2
            exit 1
          fi

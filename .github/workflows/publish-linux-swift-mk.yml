name: Publish Linux swift-mk

# Build the Linux swift-mk change-detection binary once per engine change and publish it
# as an asset on a rolling GitHub release, so every consumer's `changes` job downloads one
# prebuilt binary instead of rebuilding it. A GitHub Actions cache cannot serve this: cache
# entries are scoped by ref, so a cache saved on one consumer PR is never restorable from
# another PR, which made every consumer rebuild the ~460 MB binary. A release asset is not
# ref-scoped, so any run of any repo can download it.
on:
  push:
    branches: [main]
    # Only the engine inputs that change the compiled binary or its key. These mirror the file set
    # swift-mk-asset-key.sh hashes, so the published binary tracks the same source; Package.resolved
    # is included because it is tracked and feeds the hash. swift-mk-asset-key.sh itself is included
    # because a recipe change moves the key value, so a consumer would compute a new name and must
    # find a matching asset.
    paths:
      - "Sources/**"
      - "Package.swift"
      - "Package.resolved"
      - "scripts/swift-mk-build.sh"
      - "scripts/swift-mk-asset-key.sh"
      - ".github/workflows/publish-linux-swift-mk.yml"
  # Allow a manual rebuild-and-publish, e.g. after a base-image bump changes the runtime id.
  workflow_dispatch:

# Serialize so two main pushes cannot upload the same asset at once; cancel an older
# in-flight publish since only the newest engine build should win.
concurrency:
  group: publish-linux-swift-mk
  cancel-in-progress: true

jobs:
  # Build in the Swift container, which has the toolchain but not the GitHub CLI, then hand the
  # artifact to a host job that has gh. Splitting the two avoids installing gh into the
  # container image. This job only reads the repo and uploads a workflow artifact, so it needs
  # no write permission; the release write is confined to the publish job below.
  build:
    runs-on: ubuntu-latest
    container: swift:6.3
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      asset_name: ${{ steps.build.outputs.asset_name }}
    steps:
      - uses: actions/checkout@v7

      - name: Trust the workspace for git
        shell: bash
        # The container runs as root while actions/checkout writes the tree as the runner
        # UID, so git refuses to operate on it ("detected dubious ownership") until the
        # workspace is marked safe.
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build and name the Linux swift-mk binary
        id: build
        shell: bash
        run: |
          set -euo pipefail
          # Compute the key BEFORE building, from the checked-in files, with the same shared script
          # setup-linux-swift-mk uses, so the published asset name matches what a consumer computes.
          # `swift build` can rewrite Package.resolved, so a post-build hash would drift from the
          # consumer's pre-build hash and every consumer would miss.
          key=$(bash "${GITHUB_WORKSPACE}/scripts/swift-mk-asset-key.sh" "${GITHUB_WORKSPACE}")
          asset_name="swift-mk-linux-${key}"
          echo "publish-linux-swift-mk: building ${asset_name}"
          # Build swift-mk exactly as setup-linux-swift-mk does.
          bin="${RUNNER_TEMP}/swift-mk"
          SWIFT_MK_BIN="${bin}" SWIFT_MK_BUILD_REPO="${GITHUB_WORKSPACE}" \
              bash "${GITHUB_WORKSPACE}/scripts/swift-mk-build.sh" resolve
          if [[ ! -x "${bin}" ]]; then
              echo "publish-linux-swift-mk: build exited 0 but produced no binary at ${bin}" >&2
              exit 1
          fi
          out="${RUNNER_TEMP}/upload"
          mkdir -p "${out}"
          cp "${bin}" "${out}/${asset_name}"
          # A sidecar checksum the consumer verifies before executing the binary, catching a
          # corrupt or truncated download.
          ( cd "${out}" && shasum -a 256 "${asset_name}" > "${asset_name}.sha256" )
          echo "asset_name=${asset_name}" >> "${GITHUB_OUTPUT}"

      - name: Upload the binary to the host publish job
        uses: actions/upload-artifact@v7
        with:
          name: linux-swift-mk-binary
          path: ${{ runner.temp }}/upload/
          if-no-files-found: error
          retention-days: 1

  # Publish on the host runner, which has gh preinstalled, so no gh install is needed in the
  # Swift container. Only this job writes the release, so it is the only job granted write.
  publish:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download the built binary
        uses: actions/download-artifact@v8
        with:
          name: linux-swift-mk-binary
          path: upload

      - name: Publish to the rolling release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ASSET_NAME: ${{ needs.build.outputs.asset_name }}
        run: |
          set -euo pipefail
          tag="linux-swift-mk"
          # Create the rolling release once; keep it a non-latest prerelease so it never
          # shadows the versioned product releases in the repo's Releases list.
          if gh release view "${tag}" >/dev/null 2>&1; then
              echo "publish: rolling release ${tag} exists"
          else
              echo "publish: creating rolling release ${tag}"
              gh release create "${tag}" \
                  --title "Linux swift-mk (rolling)" \
                  --notes "Prebuilt Linux swift-mk change-detection binary, rebuilt on each engine change and consumed by setup-linux-swift-mk. Not a product release." \
                  --prerelease \
                  --latest=false
          fi
          # Skip the upload when the current pair is already present, so an action-only or
          # workflow-only change (same source_hash, same asset name) does NOT re-upload. That
          # avoids `--clobber`'s delete-then-reupload window, during which a consumer's download
          # would 404 and fall back to a full source build. When the name is new (source changed)
          # or only partially present, upload with --clobber; the only name that gets clobbered
          # then is one consumers already cannot use.
          existing=$(gh release view "${tag}" --json assets --jq '.assets[].name')
          if grep -qxF "${ASSET_NAME}" <<<"${existing}" \
              && grep -qxF "${ASSET_NAME}.sha256" <<<"${existing}"; then
              echo "publish: ${ASSET_NAME} already published; skipping upload"
          else
              echo "publish: uploading ${ASSET_NAME} and its checksum"
              gh release upload "${tag}" upload/* --clobber
          fi
          # Prune every other asset so the rolling release cannot grow past GitHub's per-release
          # asset cap over many engine changes. Pruning runs AFTER the upload, so the current
          # pair is always present; a consumer whose engine predates the current one misses and
          # rebuilds, which is the safe fallback.
          gh release view "${tag}" --json assets --jq '.assets[].name' \
            | while IFS= read -r name; do
                case "${name}" in
                  "${ASSET_NAME}" | "${ASSET_NAME}.sha256")
                    ;;
                  *)
                    echo "publish: pruning stale asset ${name}"
                    gh release delete-asset "${tag}" "${name}" --yes
                    ;;
                esac
              done

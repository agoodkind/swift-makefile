# Backstop for the self-hosted M1 pool. The broker owns the primary failover: it
# reports truthful capacity and cancels any job it accepts but cannot serve. This
# workflow covers the one case the broker cannot, which is being fully down or
# unreachable, so it cannot cancel. It finds pool-label jobs stuck queued past a
# threshold and cancels their runs, so CI never hangs even when the broker is dead.
# The cancelled run stays cancelled: the automatic rerun-to-hosted in
# ci-infra-retry is disabled, so a stranded pool run must be re-triggered by a new
# push once the pool is healthy again.
name: Pool watchdog

on:
  schedule:
    # Every 5 minutes. Scheduled workflows run on the default branch only.
    - cron: "*/5 * * * *"
  workflow_dispatch:

# One watchdog at a time. A long queue or a manual dispatch overlapping a
# scheduled run would otherwise duplicate the API scan and cancel calls; the
# newest run wins and supersedes any in-flight one, and the next 5-minute tick
# re-checks anything a superseded run had not yet reached.
concurrency:
  group: pool-watchdog
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

env:
  # The self-hosted pool label. A job queued on this label with no runner is the
  # stranding case this watchdog resolves.
  POOL_LABEL: agk-local-macos-26
  # A pool job that has been queued longer than this many seconds is treated as
  # stranded. The broker's own serving deadline is shorter, so this only fires
  # when the broker could not act at all. A warm pool runner picks a job up in
  # seconds, so a job still queued on the pool label this long means no runner
  # took it, and it should fail over to hosted quickly.
  STUCK_THRESHOLD_SECONDS: "120"

jobs:
  cancel-stranded:
    name: Cancel stranded pool jobs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Cancel runs with a pool job stuck queued
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          now_epoch="$(date -u +%s)"

          # Scan both in_progress and queued runs. A run whose only remaining job
          # is waiting on the self-hosted pool label can itself sit in `queued`
          # (nothing has started), so an in_progress-only scan would miss exactly
          # the stranding case this watchdog exists to catch. Completed runs cannot
          # hang, so they are excluded. Dedup in case a run changes state mid-scan.
          run_ids="$(
            {
              gh api --paginate \
                "repos/${REPOSITORY}/actions/runs?status=in_progress&per_page=100" \
                --jq '.workflow_runs[].id'
              gh api --paginate \
                "repos/${REPOSITORY}/actions/runs?status=queued&per_page=100" \
                --jq '.workflow_runs[].id'
            } | sort -u
          )"

          if [ -z "${run_ids}" ]; then
            printf 'no in-progress or queued runs\n'
            exit 0
          fi

          for run_id in ${run_ids}; do
            # A job is stranded when it is still queued, carries the pool label, and
            # was created longer ago than the threshold. jq emits the created_at of
            # each such job so the shell can compare ages.
            stuck_created="$(
              gh api --paginate \
                "repos/${REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100" \
                --jq '.jobs[] | select(.status == "queued") | select(any(.labels[]?; . == env.POOL_LABEL)) | .created_at'
            )"

            for created_at in ${stuck_created}; do
              created_epoch="$(date -u -d "${created_at}" +%s 2>/dev/null || printf '0')"
              if [ "${created_epoch}" -eq 0 ]; then
                continue
              fi
              age=$(( now_epoch - created_epoch ))
              if [ "${age}" -ge "${STUCK_THRESHOLD_SECONDS}" ]; then
                printf 'run %s has a pool job queued for %ss; cancelling\n' "${run_id}" "${age}"
                gh api -X POST "repos/${REPOSITORY}/actions/runs/${run_id}/cancel" || true
                break
              fi
            done
          done

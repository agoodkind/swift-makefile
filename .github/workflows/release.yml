name: Release

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# The caller must grant every permission the called workflow's jobs request,
# even for steps an input disables; the validation is static.
permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release:
    # name: swift makes the reusable-workflow check read `Release / swift / <job>`,
    # matching CI's `CI / swift / <job>` and dropping the `Release / release`
    # doubling. The job id stays `release`; only the displayed segment changes.
    name: swift
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    uses: ./.github/workflows/_release.yml
    with:
      ephemeral: ${{ github.event_name == 'pull_request' }}
      # Notarize and staple the signed swift-mk dmg; a dmg is the CLI-friendly
      # format that can carry a stapled ticket. Match only the dmg so the
      # unsigned source tarball is skipped.
      notarize-pattern: "*.dmg"
      signing-identity-name: "Developer ID Application: Alex Goodkind (H3BMXM4W7H)"
      apple-team-id: H3BMXM4W7H
      # Smoke-verify the published dmg by downloading it and running the shipped
      # swift-mk binary, so a non-launching release fails here.
      smoke-asset: swift-mk_darwin_arm64.dmg
    secrets: inherit

  release-dry-run:
    name: Release (dry run)
    needs: release
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require signed release dry run success
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository && needs.release.result != 'success' }}
        run: |
          echo "Signed release dry run did not succeed (result: ${{ needs.release.result }})." >&2
          exit 1
      - name: Report signed release dry run
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository && needs.release.result == 'success' }}
        run: echo "Signed release dry run completed without publishing." >> "${GITHUB_STEP_SUMMARY}"
      - name: Report fork skip
        if: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
        run: echo "Signed release dry run skipped for a fork pull request." >> "${GITHUB_STEP_SUMMARY}"

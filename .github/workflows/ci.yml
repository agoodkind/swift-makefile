name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # The caller job id is the middle segment of every reusable-workflow status
  # check name (`CI / swift / Build`), so it names the toolchain, not "ci".
  swift:
    uses: ./.github/workflows/_ci.yml
    with:
      extra-targets: '["smoke-fetch"]'
      # Route heavy gates to the self-hosted M1 pool when it reports capacity;
      # an empty/unset URL or an unreachable broker falls back to hosted.
      local-pool-capacity-url: ${{ vars.BROKER_CAPACITY_URL }}
    secrets: inherit

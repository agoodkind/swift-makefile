name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/_ci.yml
    with:
      # lint/audit/deadcode run once in the reusable workflow's mandatory gate
      # job, so the matrix only carries the smoke fetch, the build, and tests.
      targets: '["smoke-fetch","build","test"]'
    secrets: inherit

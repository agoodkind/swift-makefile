name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # The reusable Quality aggregator reads this run's jobs to resolve each lint's
  # pool-or-hosted outcome. A reusable job cannot request a scope the caller does
  # not grant, so grant actions:read here.
  actions: read

jobs:
  # The caller job id is the middle segment of every reusable-workflow status
  # check name (`CI / swift / Build`), so it names the toolchain, not "ci".
  swift:
    uses: ./.github/workflows/_ci.yml
    with:
      import-signing-cert: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      signing-identity-name: "Developer ID Application: Alex Goodkind (H3BMXM4W7H)"
      apple-team-id: H3BMXM4W7H
      extra-targets: '["smoke-fetch", "sign-smoke"]'
      # Try the M1 self-hosted pool first; plan-runners falls back to hosted when
      # the pool is unavailable. The bearer token rides secrets: inherit.
      local-pool-capacity-url: ${{ vars.BROKER_CAPACITY_URL }}
    secrets: inherit

# Reusable runner planner. Each invocation decides which runner label one gate
# should use: the self-hosted M1 pool when its broker reports capacity, else the
# hosted fallback. CI invokes this once per macOS gate so capacity decisions are
# independent; Release invokes it once for its shared route. Runs on ubuntu-latest
# (fast, cheap). Fork PRs short-circuit to hosted before any network call. When
# local-pool-capacity-url is empty or the capacity endpoint says the pool is busy,
# the invocation falls back to inputs.runner automatically.
name: Plan runners

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: macos-latest
      # When this points at a broker that reports available capacity, gates run
      # on local-pool-label; otherwise they fall back to inputs.runner. The URL
      # defaults to the shared broker, whose /capacity endpoint is public, so any
      # caller auto-routes to the pool with no config. Set this to an empty string
      # to force hosted.
      local-pool-capacity-url:
        type: string
        default: "https://darwin-gh-broker.silver-flare.com/capacity"
      # Runner label for the self-hosted pool. Ignored when the pool is
      # unavailable or local-pool-capacity-url is empty.
      local-pool-label:
        type: string
        default: agk-local-macos-26
      # Seconds the planner waits on the free ubuntu runner for a pool slot
      # before it gives up and routes to hosted. While the pool has no free slot
      # and the broker reports hosted has no headroom, the planner keeps waiting
      # so a job releases to hosted only when hosted is actually free, rather than
      # piling onto a busy hosted queue. The wait costs no macOS minutes and holds
      # no pool slot. A broker that does not report hosted_free is treated as
      # hosted-free, so this collapses to the prior route-now behavior.
      pool-wait-timeout:
        type: number
        default: 1800
    secrets:
      # Bearer token for the pool's guarded /capacity endpoint. When set (with a
      # non-empty local-pool-capacity-url) the check authenticates; absent or
      # wrong, the broker returns 401 and the gate falls back to hosted, so CI is
      # never blocked.
      LOCAL_POOL_CAPACITY_TOKEN:
        required: false
    outputs:
      label:
        description: Runner label selected by this planner invocation.
        value: ${{ jobs.plan.outputs.label }}
      # Compatibility aliases used by _release.yml and older callers.
      build_label:
        description: Runner label for the Build gate (pool or hosted).
        value: ${{ jobs.plan.outputs.build_label }}
      test_label:
        description: Runner label for the Test gate.
        value: ${{ jobs.plan.outputs.test_label }}
      quality_label:
        description: Runner label for the Quality gates.
        value: ${{ jobs.plan.outputs.quality_label }}
      extra_targets_label:
        description: Runner label for the Extra Targets gate.
        value: ${{ jobs.plan.outputs.extra_targets_label }}
      on_pool:
        # True when this invocation routed to the self-hosted pool, so a hosted
        # fallback is meaningful.
        description: Whether the chosen label is the self-hosted pool.
        value: ${{ jobs.plan.outputs.on_pool }}

env:
  # The ci-diagnostics PR label turns on swift-mk debug logging for every job in
  # this workflow. Empty keeps unlabeled runs at swift-mk's default quiet level.
  SWIFT_MK_LOG_LEVEL: ${{ contains(github.event.pull_request.labels.*.name, 'ci-diagnostics') && 'debug' || '' }}

jobs:
  plan:
    name: Plan runner
    runs-on: ubuntu-latest
    # Covers the default pool-wait-timeout (1800s) plus curl/jq overhead. The
    # wait runs on this free ubuntu runner, so a long wait costs no macOS time.
    timeout-minutes: 40
    permissions:
      contents: read
    outputs:
      label: ${{ steps.pick.outputs.label }}
      build_label: ${{ steps.pick.outputs.build_label }}
      test_label: ${{ steps.pick.outputs.test_label }}
      quality_label: ${{ steps.pick.outputs.quality_label }}
      extra_targets_label: ${{ steps.pick.outputs.extra_targets_label }}
      on_pool: ${{ steps.pick.outputs.on_pool }}
    steps:
      - name: Pick runner labels
        id: pick
        env:
          CAPACITY_URL: ${{ inputs.local-pool-capacity-url }}
          CAPACITY_TOKEN: ${{ secrets.LOCAL_POOL_CAPACITY_TOKEN }}
          POOL_LABEL: ${{ inputs.local-pool-label }}
          HOSTED_LABEL: ${{ inputs.runner }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          POOL_WAIT_TIMEOUT: ${{ inputs.pool-wait-timeout }}
          # Seconds between capacity polls while waiting for the pool.
          POLL_INTERVAL: "15"
          # Evaluates to "true" for fork PRs; everything else is trusted.
          IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          set -euo pipefail

          # Emit the chosen label as the generic output and as the compatibility
          # aliases. on_pool is true only when a pool label was chosen, so a hosted
          # fallback never re-runs a gate that already ran on hosted.
          emit() {
            local label="$1" on_pool
            if [[ "${label}" != "${HOSTED_LABEL}" ]]; then
              on_pool=true
            else
              on_pool=false
            fi
            {
              printf 'label=%s\n' "${label}"
              printf 'build_label=%s\n' "${label}"
              printf 'test_label=%s\n' "${label}"
              printf 'quality_label=%s\n' "${label}"
              printf 'extra_targets_label=%s\n' "${label}"
              printf 'on_pool=%s\n' "${on_pool}"
            } >> "${GITHUB_OUTPUT}"
          }

          # Untrusted event or no pool configured: never curl the internal
          # endpoint; route straight to hosted.
          if [[ "${IS_FORK_PR}" == "true" || -z "${CAPACITY_URL}" ]]; then
            emit "${HOSTED_LABEL}"
            exit 0
          fi

          # Pick the query separator so a capacity URL that already carries a query
          # string stays valid instead of producing a double '?'.
          sep='?'
          case "${CAPACITY_URL}" in *\?*) sep='&' ;; esac
          # Only send an Authorization header when a token is configured. The
          # default public /capacity needs no token, and an empty "Bearer " can be
          # rejected by a proxy in front of the endpoint, which would defeat the
          # tokenless auto-routing. The quoted array expansion keeps the whole
          # "Authorization: Bearer <token>" header as one argv entry (no word
          # splitting), and an empty array expands to nothing under set -u.
          auth=()
          if [[ -n "${CAPACITY_TOKEN}" ]]; then
            auth+=(-H "Authorization: Bearer ${CAPACITY_TOKEN}")
          fi

          # Prefer the pool. Wait on this free ubuntu runner while the pool has no
          # free slot AND the broker reports hosted has no headroom, so a job
          # releases to hosted only when hosted is actually free rather than piling
          # onto a busy hosted queue. A broker that does not report hosted_free is
          # treated as hosted-free (jq '// true'), collapsing this to the prior
          # pool-if-available-else-hosted behavior. A curl error means the broker is
          # unreachable, so fail open to hosted and never block CI.
          started=$(date +%s)
          deadline=$(( started + POOL_WAIT_TIMEOUT ))
          while :; do
            response=$(curl -sf --max-time 5 "${auth[@]}" \
              "${CAPACITY_URL}${sep}repo=${REPO}&run_id=${RUN_ID}" 2>/dev/null || printf '')
            if [[ -z "${response}" ]]; then
              echo "capacity endpoint unreachable; routing to hosted"
              emit "${HOSTED_LABEL}"
              exit 0
            fi
            available=$(printf '%s' "${response}" | jq -r '.available // false' 2>/dev/null || printf 'false')
            hosted_free=$(printf '%s' "${response}" | jq -r '.hosted_free // true' 2>/dev/null || printf 'true')
            if [[ "${available}" == "true" ]]; then
              echo "pool slot available; routing to pool"
              emit "${POOL_LABEL}"
              exit 0
            fi
            if [[ "${hosted_free}" == "true" ]]; then
              echo "pool busy, hosted has headroom; routing to hosted"
              emit "${HOSTED_LABEL}"
              exit 0
            fi
            now=$(date +%s)
            if (( now >= deadline )); then
              echo "pool busy and hosted full for ${POOL_WAIT_TIMEOUT}s; routing to hosted as last resort"
              emit "${HOSTED_LABEL}"
              exit 0
            fi
            echo "pool busy and hosted full; waiting ${POLL_INTERVAL}s (elapsed $(( now - started ))s / ${POOL_WAIT_TIMEOUT}s)"
            sleep "${POLL_INTERVAL}"
          done

# Reusable Swift release pipeline: meta -> build (+SBOM) -> notarize/staple
# (+attestations) -> publish. The make layer owns all build and publish logic
# (release-meta / release-build / release-publish in swift-release.mk); this
# workflow only orchestrates. Signing and notarization silently no-op when the
# Apple secrets are absent, so a fork or a secretless repo still releases.
name: Release

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: macos-latest
      publish-runner:
        type: string
        default: ubuntu-latest
      # Self-hosted macOS pool routing, shared with _ci.yml through the reusable
      # _plan-runners.yml. When the broker reports capacity the macOS jobs (build,
      # notarize) run on local-pool-label; otherwise they fall back to inputs.runner.
      # When the broker cannot serve, plan-runners routes to hosted before any job
      # starts; a mid-run pool outage strands the job and the pool-watchdog cancels
      # it, so a cancelled release is re-run manually rather than automatically.
      # Set the URL to an empty string to force hosted.
      local-pool-capacity-url:
        type: string
        default: "https://darwin-gh-broker.silver-flare.com/capacity"
      local-pool-label:
        type: string
        default: agk-local-macos-26
      xcode-version:
        type: string
        default: latest-stable
      build-target:
        type: string
        default: release-build
      dist-dir:
        type: string
        default: dist
      make-args:
        type: string
        default: ""
      brew-packages:
        type: string
        default: ""
      cache-profile:
        type: string
        default: safe
      cache-version:
        type: string
        default: v1
      notarize:
        type: boolean
        default: true
      # Globs evaluated inside dist-dir naming the artifacts to notarize.
      notarize-pattern:
        type: string
        default: "*.dmg *.zip *.pkg"
      attest:
        type: boolean
        default: true
      # Path of the built product to SBOM-scan; empty skips the SBOM.
      sbom-subject-path:
        type: string
        default: ""
      # Install a Developer ID provisioning profile before building, for apps with
      # entitlements that require one (iCloud). Requires the
      # APPLE_DEVELOPER_ID_PROFILE_BASE64 secret; silently skipped when absent.
      install-provisioning-profile:
        type: boolean
        default: false
      signing-identity-name:
        type: string
        default: ""
      apple-team-id:
        type: string
        default: ""
      # Asset to smoke-verify after publish: the smoke job downloads it and runs
      # the swift-mk verify-release check (staple, codesign, team id, then runs
      # the binary and asserts the tag). Empty skips the smoke. The caller names
      # its own asset so this reusable workflow stays generic instead of pinning
      # one repo's artifact.
      smoke-asset:
        type: string
        default: ""
      extra-cache-paths:
        type: string
        default: ""
      timeout-minutes:
        type: number
        default: 45
    secrets:
      APPLE_DEVELOPER_ID_P12_BASE64:
        required: false
      APPLE_DEVELOPER_ID_P12_PASSWORD:
        required: false
      APPLE_DEVELOPER_ID_PROFILE_BASE64:
        required: false
      APPLE_NOTARY_KEY_BASE64:
        required: false
      APPLE_NOTARY_KEY_ID:
        required: false
      APPLE_NOTARY_ISSUER_ID:
        required: false
      # Bearer token for the pool's guarded /capacity endpoint, passed through to
      # _plan-runners.yml. Absent, the capacity check runs tokenless against the
      # public endpoint.
      LOCAL_POOL_CAPACITY_TOKEN:
        required: false

concurrency:
  group: release
  cancel-in-progress: false

env:
  # The swift-makefile bootstrap fetches swift.mk via `gh api`; unauthenticated
  # fetches fail silently, so every consumer needs this token.
  GH_TOKEN: ${{ github.token }}

jobs:
  # Decide pool-or-hosted for the macOS jobs, reusing the same capacity check the
  # CI gates use, so release is infra-agnostic.
  plan-runners:
    uses: ./.github/workflows/_plan-runners.yml
    with:
      runner: ${{ inputs.runner }}
      local-pool-capacity-url: ${{ inputs.local-pool-capacity-url }}
      local-pool-label: ${{ inputs.local-pool-label }}
    # Pass only the capacity token the planner uses, not the Apple signing/notary secrets.
    secrets:
      LOCAL_POOL_CAPACITY_TOKEN: ${{ secrets.LOCAL_POOL_CAPACITY_TOKEN }}

  meta:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      build_version: ${{ steps.meta.outputs.build_version }}
      marketing_version: ${{ steps.meta.outputs.marketing_version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Compute release metadata
        id: meta
        run: make release-meta

  build:
    needs: [meta, plan-runners]
    runs-on: ${{ needs.plan-runners.outputs.build_label }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    env:
      HAS_SIGNING: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 != '' }}
      HAS_PROFILE: ${{ secrets.APPLE_DEVELOPER_ID_PROFILE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install brew packages
        if: inputs.brew-packages != ''
        run: brew install ${{ inputs.brew-packages }}

      - name: Setup Swift build env
        if: github.repository == 'agoodkind/swift-makefile'
        uses: ./.github/actions/setup-build-env
        with:
          xcode-version: ${{ inputs.xcode-version }}
          github-token: ${{ github.token }}
          cache-profile: ${{ inputs.cache-profile }}
          cache-version: ${{ inputs.cache-version }}
          extra-cache-paths: ${{ inputs.extra-cache-paths }}

      - name: Setup Swift build env
        if: github.repository != 'agoodkind/swift-makefile'
        uses: agoodkind/swift-makefile/.github/actions/setup-build-env@main
        with:
          xcode-version: ${{ inputs.xcode-version }}
          github-token: ${{ github.token }}
          cache-profile: ${{ inputs.cache-profile }}
          cache-version: ${{ inputs.cache-version }}
          extra-cache-paths: ${{ inputs.extra-cache-paths }}

      - name: Install signing certificate
        id: cert
        if: env.HAS_SIGNING == 'true'
        uses: agoodkind/swift-makefile/.github/actions/import-signing-cert@main
        with:
          p12-base64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          identity-name: ${{ inputs.signing-identity-name }}

      - name: Install provisioning profile
        id: profile
        if: ${{ inputs.install-provisioning-profile && env.HAS_PROFILE == 'true' }}
        uses: agoodkind/swift-makefile/.github/actions/install-provisioning-profile@main
        with:
          profile-base64: ${{ secrets.APPLE_DEVELOPER_ID_PROFILE_BASE64 }}

      # Signing values pass as make command-line variables only when present, so
      # a secretless run never clobbers a consumer's ?= defaults with empties.
      # Notary credentials are exposed too: a consumer whose build hook must
      # notarize mid-build (bare CLI binaries that the staple step cannot help)
      # submits from inside make and sets `notarize: false` on this workflow.
      - name: Build release artifacts
        shell: bash
        env:
          CERT_SHA1: ${{ steps.cert.outputs.identity-sha1 }}
          CODE_SIGN_KEYCHAIN: ${{ steps.cert.outputs.keychain }}
          TEAM_ID: ${{ inputs.apple-team-id }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ steps.profile.outputs.profile-specifier }}
          RELEASE_TAG: ${{ needs.meta.outputs.tag }}
          MARKETING_VERSION: ${{ needs.meta.outputs.marketing_version }}
          CURRENT_PROJECT_VERSION: ${{ needs.meta.outputs.build_version }}
          SWIFT_MK_DIST_DIR: ${{ inputs.dist-dir }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          # Route caller-provided make inputs through env so they are shell data,
          # not template text expanded into the script (avoids code injection via
          # build-target or make-args).
          BUILD_TARGET: ${{ inputs.build-target }}
          MAKE_ARGS: ${{ inputs.make-args }}
        run: |
          sign_args=()
          if [ -n "${CERT_SHA1:-}" ]; then
            sign_args+=("CODE_SIGN_IDENTITY=$CERT_SHA1" "DMG_SIGN_IDENTITY=$CERT_SHA1")
          fi
          if [ -n "${CODE_SIGN_KEYCHAIN:-}" ]; then
            sign_args+=("CODE_SIGN_KEYCHAIN=$CODE_SIGN_KEYCHAIN")
          fi
          if [ -n "${TEAM_ID:-}" ]; then
            sign_args+=("DEVELOPMENT_TEAM=$TEAM_ID")
          fi
          # shellcheck disable=SC2086
          make $BUILD_TARGET $MAKE_ARGS "${sign_args[@]}"

      - name: Generate SBOM
        if: inputs.sbom-subject-path != ''
        uses: anchore/sbom-action@v0.24.0
        with:
          path: ${{ inputs.sbom-subject-path }}
          format: spdx-json
          output-file: ${{ inputs.dist-dir }}/sbom-${{ needs.meta.outputs.tag }}.spdx.json
          upload-artifact: false

      - uses: actions/upload-artifact@v7
        with:
          name: release-dist-${{ needs.meta.outputs.tag }}
          path: ${{ inputs.dist-dir }}/*
          if-no-files-found: error

  notarize:
    needs: [meta, build, plan-runners]
    runs-on: ${{ needs.plan-runners.outputs.build_label }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      HAS_NOTARY: ${{ secrets.APPLE_NOTARY_KEY_BASE64 != '' }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-dist-${{ needs.meta.outputs.tag }}
          path: ${{ inputs.dist-dir }}

      # Expand the notarize pattern into an explicit newline-separated file list
      # once; the notarize and attest steps all consume the same list.
      - name: Resolve release artifacts
        id: artifacts
        run: |
          cd "${{ inputs.dist-dir }}"
          {
            echo "list<<ARTIFACTS_EOF"
            for f in ${{ inputs.notarize-pattern }}; do
              if [ -e "$f" ]; then echo "${{ inputs.dist-dir }}/$f"; fi
            done
            echo "ARTIFACTS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Notarize and staple
        if: ${{ inputs.notarize && env.HAS_NOTARY == 'true' }}
        uses: agoodkind/swift-makefile/.github/actions/notarize-staple@main
        with:
          artifact-path: ${{ steps.artifacts.outputs.list }}
          notary-key-base64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          notary-key-id: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          notary-issuer-id: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}

      - name: Attest provenance
        if: ${{ inputs.attest && steps.artifacts.outputs.list != '' }}
        uses: actions/attest@v4.1.1
        with:
          subject-path: ${{ steps.artifacts.outputs.list }}

      - name: Attest SBOM
        if: ${{ inputs.attest && inputs.sbom-subject-path != '' && steps.artifacts.outputs.list != '' }}
        uses: actions/attest@v4.1.1
        with:
          subject-path: ${{ steps.artifacts.outputs.list }}
          sbom-path: ${{ inputs.dist-dir }}/sbom-${{ needs.meta.outputs.tag }}.spdx.json

      # One artifact name for publish, whether or not notarization ran.
      - uses: actions/upload-artifact@v7
        with:
          name: release-dist-stapled-${{ needs.meta.outputs.tag }}
          path: ${{ inputs.dist-dir }}/*
          if-no-files-found: error

  publish:
    needs: [meta, build, notarize]
    runs-on: ${{ inputs.publish-runner }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: release-dist-stapled-${{ needs.meta.outputs.tag }}
          path: ${{ inputs.dist-dir }}
      - name: Publish release
        env:
          RELEASE_TAG: ${{ needs.meta.outputs.tag }}
          SWIFT_MK_DIST_DIR: ${{ inputs.dist-dir }}
        run: make release-publish

  smoke:
    needs: [meta, publish]
    if: inputs.smoke-asset != ''
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    env:
      REQUIRE_SIGNATURE: ${{ inputs.notarize && secrets.APPLE_DEVELOPER_ID_P12_BASE64 != '' && secrets.APPLE_NOTARY_KEY_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Swift build env
        if: github.repository == 'agoodkind/swift-makefile'
        uses: ./.github/actions/setup-build-env
        with:
          xcode-version: ${{ inputs.xcode-version }}
          github-token: ${{ github.token }}
          install-lint-tools: "false"
          cache-profile: ${{ inputs.cache-profile }}
          cache-version: ${{ inputs.cache-version }}
          extra-cache-paths: ${{ inputs.extra-cache-paths }}

      - name: Setup Swift build env
        if: github.repository != 'agoodkind/swift-makefile'
        uses: agoodkind/swift-makefile/.github/actions/setup-build-env@main
        with:
          xcode-version: ${{ inputs.xcode-version }}
          github-token: ${{ github.token }}
          install-lint-tools: "false"
          cache-profile: ${{ inputs.cache-profile }}
          cache-version: ${{ inputs.cache-version }}
          extra-cache-paths: ${{ inputs.extra-cache-paths }}

      - name: Verify published release
        shell: bash
        env:
          RELEASE_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.meta.outputs.tag }}
          RELEASE_ASSET: ${{ inputs.smoke-asset }}
          RELEASE_TEAM_ID: ${{ inputs.apple-team-id }}
        run: |
          set -euo pipefail

          swift_mk="${HOME}/.swift-mk-ci-toolchain/swift-mk"
          verify_args=(
            verify-release
            --repo "${RELEASE_REPO}"
            --tag "${RELEASE_TAG}"
            --asset "${RELEASE_ASSET}"
            --team-id "${RELEASE_TEAM_ID}"
          )
          if [[ "${REQUIRE_SIGNATURE}" = "true" ]]; then
            verify_args+=(--require-signature)
          else
            verify_args+=(--no-require-signature)
          fi

          attempt=1
          max_attempts=5
          while true; do
            if "${swift_mk}" "${verify_args[@]}"; then
              exit 0
            fi
            if [[ "${attempt}" -ge "${max_attempts}" ]]; then
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 15
          done

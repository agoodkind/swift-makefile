report_exclude:
  - .build/**
  - .make/**
  - build/**
  - Products/**
  - Derived/**
  - DerivedData/**
strict: true
retain_public: true
retain_objc_accessible: true
retain_codable_properties: true
retain_swift_ui_previews: true
# Standard retain-to-live types: a stored property of one of these exists only to
# keep an object alive and is never read, so it is load-bearing rather than dead.
retain_assign_only_property_types:
  - DispatchSourceProtocol
  - DispatchSourceSignal
  - DispatchSourceTimer
  - DispatchSourceRead
  - DispatchSourceWrite
  - DispatchSourceFileSystemObject
  - DispatchSourceMemoryPressure
  - DispatchWorkItem
  - AnyCancellable
  - NSObjectProtocol
  - NWListener
  - NWConnection
  - NWPathMonitor
  - Timer
clean_build: true
disable_update_check: true
format: xcode

# swift-makefile-owned OSV policy for shared gate dependencies. This file is the
# single source of OSV exceptions. The audit gate reads only the fetched copy at
# .make/osv-scanner.toml; a consumer cannot override it, so the gate cannot be
# weakened downstream. Manage every exception here.

[[PackageOverrides]]
name = "github.com/apple/swift-nio-http2"
version = "1.44.0"
ecosystem = "SwiftURL"
vulnerability.ignore = true
effectiveUntil = 2026-12-26
reason = "OSV currently marks swift-nio-http2 1.44.0 vulnerable even though GitHub advisory GHSA-4px2-pw77-vc85 and the Swift Forums security release identify 1.44.0 as the fixed release; remove this after OSV metadata aligns."
